spring:
  datasource:
    url: jdbc:mysql://localhost:3306/qa_platform?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 30000
      pool-name: QAHikariCP
      connection-test-query: SELECT 1
      leak-detection-threshold: 60000
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB
  web:
    resources:
      static-locations: classpath:/static/,file:E:/Test/XiangMu/LunTan_Demo/qa-platform/uploads/
      cache:
        period: 86400
  jmx:
    enabled: false
  # 数据库初始化配置
  sql:
    init:
      enabled: false

mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.example.qa.entity
  configuration:
    cache-enabled: true
    lazy-loading-enabled: true
    default-statement-timeout: 3000
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      table-prefix: 
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
    banner: false
    enable-auto-merge-sql: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

server:
  port: 8080
  address: 0.0.0.0

# 文件上传配置
file:
  upload:
    path: E:/Test/XiangMu/LunTan_Demo/qa-platform/uploads/
