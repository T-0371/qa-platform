<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT技术问答网站 - 忘记密码</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Orbitron:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --bg-primary: linear-gradient(145deg, #0f0f1e 0%, #1a1a2e 25%,  #16213e 50%, #0d0d1a 75%, #0a0a14 100%);
            --bg-secondary: rgba(26, 26, 46, 0.6);
            --text-primary: #e8eaed;
            --text-secondary: #94a3b8;
            --border-color: rgba(236, 72, 153, 0.1);
            --accent-color: #ec4899;
            --shadow-color: rgba(0, 0, 0, 0.4);
        }
        
        [data-theme="light"] {
            --bg-primary: linear-gradient(145deg, #f8fafc 0%, #e2e8f0 25%, #cbd5e1 50%, #e2e8f0 75%, #f8fafc 100%);
            --bg-secondary: rgba(255, 255, 255, 0.8);
            --text-primary: #1e293b;
            --text-secondary: #475569;
            --border-color: rgba(71, 85, 105, 0.1);
            --shadow-color: rgba(0, 0, 0, 0.1);
        }
        
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px 0;
        }
        
        .container {
            width: 100%;
            max-width: 480px;
            padding: 20px;
        }
        
        .card {
            background: var(--bg-secondary);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 8px 32px var(--shadow-color);
        }
        
        .card-header {
            text-align: center;
            margin-bottom: 35px;
        }
        
        .card-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }
        
        .card-subtitle {
            color: var(--text-secondary);
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-primary);
            font-size: 14px;
        }
        
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 15px;
            background: rgba(26, 31, 58, 0.6);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 10px;
            font-size: 14px;
            color: var(--text-primary);
            font-family: 'Noto Sans SC', sans-serif;
        }
        
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.3);
        }
        
        .btn {
            padding: 14px 20px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            width: 100%;
            transition: all 0.3s ease;
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }
        
        .btn-secondary {
            background: rgba(99, 102, 241, 0.2);
            color: var(--text-primary);
            border: 1px solid rgba(99, 102, 241, 0.3);
            margin-top: 10px;
        }
        
        .btn-secondary:hover:not(:disabled) {
            background: rgba(99, 102, 241, 0.3);
        }
        
        .hidden {
            display: none !important;
        }
        
        .message-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 2000;
        }
        
        .success-message,
        .error-message {
            padding: 15px 25px;
            border-radius: 10px;
            margin-bottom: 10px;
            animation: slideIn 0.3s ease-out;
            font-weight: 500;
            color: white;
        }
        
        .success-message {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.9) 0%, rgba(5, 150, 105, 0.9) 100%);
        }
        
        .error-message {
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.9) 0%, rgba(220, 38, 38, 0.9) 100%);
        }
        
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        
        .form-footer {
            text-align: center;
            margin-top: 25px;
            color: var(--text-secondary);
            font-size: 14px;
        }
        
        .form-footer a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }
        
        .form-footer a:hover {
            color: #764ba2;
        }
        
        .step-indicator {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
        }
        
        .step {
            display: flex;
            align-items: center;
            color: var(--text-secondary);
            font-size: 14px;
        }
        
        .step.active {
            color: #667eea;
            font-weight: 600;
        }
        
        .step.completed {
            color: #10b981;
        }
        
        .step-number {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: rgba(99, 102, 241, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 8px;
            font-size: 12px;
        }
        
        .step.active .step-number {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .step.completed .step-number {
            background: #10b981;
            color: white;
        }
        
        .step-line {
            width: 40px;
            height: 2px;
            background: rgba(99, 102, 241, 0.2);
            margin: 0 10px;
        }
        
        .step-line.completed {
            background: #10b981;
        }
        
        .security-question-display {
            background: rgba(99, 102, 241, 0.1);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            border-left: 4px solid #667eea;
        }
        
        .security-question-display label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 5px;
        }
        
        .security-question-display p {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
        }
        
        /* 移动端响应式设计 */
        @media (max-width: 768px) {
            body {
                padding: 10px 0;
            }
            
            .container {
                padding: 10px;
            }
            
            .card {
                padding: 25px 20px;
                border-radius: 15px;
            }
            
            .card-title {
                font-size: 24px;
            }
            
            .card-subtitle {
                font-size: 13px;
            }
            
            .step-indicator {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }
            
            .step-line {
                display: none;
            }
            
            .step {
                flex-direction: row;
                width: 100%;
                justify-content: flex-start;
            }
            
            .step-number {
                width: 30px;
                height: 30px;
                font-size: 14px;
            }
            
            .step span {
                font-size: 13px;
            }
            
            .form-group {
                margin-bottom: 15px;
            }
            
            .form-group label {
                font-size: 13px;
            }
            
            .form-group input,
            .form-group select {
                padding: 10px 12px;
                font-size: 14px;
            }
            
            .btn {
                padding: 12px 20px;
                font-size: 15px;
            }
            
            .btn-full {
                width: 100%;
            }
        }
        
        @media (max-width: 480px) {
            .card {
                padding: 20px 15px;
            }
            
            .card-title {
                font-size: 20px;
            }
            
            .card-subtitle {
                font-size: 12px;
            }
            
            .step-number {
                width: 28px;
                height: 28px;
                font-size: 13px;
            }
            
            .step span {
                font-size: 12px;
            }
            
            .form-group input,
            .form-group select {
                padding: 10px;
                font-size: 13px;
            }
            
            .btn {
                padding: 10px 16px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div id="messageContainer" class="message-container"></div>
    
    <div class="container">
        <div class="card">
            <div class="card-header">
                <div class="card-title">忘记密码</div>
                <div class="card-subtitle">通过密保问题重置密码</div>
            </div>
            
            <div class="step-indicator">
                <div class="step active" id="step1Indicator">
                    <div class="step-number">1</div>
                    <span>输入用户名</span>
                </div>
                <div class="step-line" id="line1"></div>
                <div class="step" id="step2Indicator">
                    <div class="step-number">2</div>
                    <span>验证密保</span>
                </div>
                <div class="step-line" id="line2"></div>
                <div class="step" id="step3Indicator">
                    <div class="step-number">3</div>
                    <span>重置密码</span>
                </div>
            </div>
            
            <!-- 步骤1：输入用户名 -->
            <div id="step1" class="step-content">
                <div class="form-group">
                    <label for="username">用户名</label>
                    <input type="text" id="username" placeholder="请输入您的用户名" required>
                </div>
                <div class="form-group">
                    <button class="btn btn-primary" onclick="getSecurityQuestion()">下一步</button>
                </div>
            </div>
            
            <!-- 步骤2：验证密保 -->
            <div id="step2" class="step-content hidden">
                <div class="security-question-display">
                    <label>密保问题</label>
                    <p id="securityQuestionText"></p>
                </div>
                <div class="form-group">
                    <label for="securityAnswer">密保答案</label>
                    <input type="text" id="securityAnswer" placeholder="请输入密保答案" required>
                </div>
                <div class="form-group">
                    <button class="btn btn-primary" onclick="verifySecurityAnswer()">验证</button>
                    <button class="btn btn-secondary" onclick="goBackToStep1()">返回上一步</button>
                </div>
            </div>
            
            <!-- 步骤3：重置密码 -->
            <div id="step3" class="step-content hidden">
                <div class="form-group">
                    <label for="newPassword">新密码</label>
                    <input type="password" id="newPassword" placeholder="请输入新密码（6-20个字符）" minlength="6" maxlength="20" required>
                </div>
                <div class="form-group">
                    <label for="confirmNewPassword">确认新密码</label>
                    <input type="password" id="confirmNewPassword" placeholder="请再次输入新密码" required>
                </div>
                <div class="form-group">
                    <button class="btn btn-primary" onclick="resetPassword()">重置密码</button>
                    <button class="btn btn-secondary" onclick="goBackToStep2()">返回上一步</button>
                </div>
            </div>
            
            <div class="form-footer">
                想起密码了？<a href="/login.html">立即登录</a>
            </div>
        </div>
    </div>
    
    <script>
        const API_BASE_URL = '/api';
        let currentUsername = '';
        
        function loadTheme() {
            const savedTheme = localStorage.getItem('theme') || 'default';
            document.documentElement.setAttribute('data-theme', savedTheme);
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            loadTheme();
            document.getElementById('username').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    getSecurityQuestion();
                }
            });
            document.getElementById('securityAnswer').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    verifySecurityAnswer();
                }
            });
        });
        
        function showMessage(message, type) {
            type = type || 'success';
            var messageDiv = document.createElement('div');
            messageDiv.className = type === 'success' ? 'success-message' : 'error-message';
            messageDiv.textContent = message;
            
            var container = document.getElementById('messageContainer');
            container.appendChild(messageDiv);
            
            setTimeout(function() {
                messageDiv.remove();
            }, 3000);
        }
        
        function updateStepIndicator(step) {
            var steps = ['step1Indicator', 'step2Indicator', 'step3Indicator'];
            var lines = ['line1', 'line2'];
            
            steps.forEach(function(s, index) {
                var el = document.getElementById(s);
                el.classList.remove('active', 'completed');
                if (index < step - 1) {
                    el.classList.add('completed');
                } else if (index === step - 1) {
                    el.classList.add('active');
                }
            });
            
            lines.forEach(function(l, index) {
                var el = document.getElementById(l);
                el.classList.remove('completed');
                if (index < step - 1) {
                    el.classList.add('completed');
                }
            });
        }
        
        async function getSecurityQuestion() {
            var username = document.getElementById('username').value.trim();
            
            if (!username) {
                showMessage('请输入用户名', 'error');
                return;
            }
            
            try {
                var response = await fetch(API_BASE_URL + '/users/security-question?username=' + encodeURIComponent(username));
                var data = await response.json();
                
                if (data.code === 200) {
                    currentUsername = username;
                    document.getElementById('securityQuestionText').textContent = data.data;
                    document.getElementById('step1').classList.add('hidden');
                    document.getElementById('step2').classList.remove('hidden');
                    updateStepIndicator(2);
                } else {
                    showMessage(data.message || '获取密保问题失败', 'error');
                }
            } catch (error) {
                console.error('获取密保问题失败：', error);
                showMessage('获取密保问题失败，请检查网络连接', 'error');
            }
        }
        
        function goBackToStep1() {
            document.getElementById('step2').classList.add('hidden');
            document.getElementById('step1').classList.remove('hidden');
            updateStepIndicator(1);
        }
        
        async function verifySecurityAnswer() {
            var answer = document.getElementById('securityAnswer').value.trim();
            
            if (!answer) {
                showMessage('请输入密保答案', 'error');
                return;
            }
            
            try {
                var response = await fetch(API_BASE_URL + '/users/verify-security-answer', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: currentUsername,
                        securityAnswer: answer
                    })
                });
                
                var data = await response.json();
                
                if (data.code === 200) {
                    document.getElementById('step2').classList.add('hidden');
                    document.getElementById('step3').classList.remove('hidden');
                    document.getElementById('newPassword').value = '';
                    document.getElementById('confirmNewPassword').value = '';
                    updateStepIndicator(3);
                    showMessage('密保验证成功，请设置新密码', 'success');
                } else {
                    showMessage(data.message || '密保答案错误', 'error');
                }
            } catch (error) {
                console.error('验证密保答案失败：', error);
                showMessage('验证失败，请检查网络连接', 'error');
            }
        }
        
        function goBackToStep2() {
            document.getElementById('step3').classList.add('hidden');
            document.getElementById('step2').classList.remove('hidden');
            updateStepIndicator(2);
        }
        
        async function resetPassword() {
            var newPassword = document.getElementById('newPassword').value;
            var confirmNewPassword = document.getElementById('confirmNewPassword').value;
            
            if (!newPassword) {
                showMessage('请输入新密码', 'error');
                return;
            }
            
            if (newPassword.length < 6 || newPassword.length > 20) {
                showMessage('密码长度应为6-20个字符', 'error');
                return;
            }
            
            if (newPassword !== confirmNewPassword) {
                showMessage('两次输入的密码不一致', 'error');
                return;
            }
            
            try {
                var response = await fetch(API_BASE_URL + '/users/reset-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: currentUsername,
                        newPassword: newPassword
                    })
                });
                
                var data = await response.json();
                
                if (data.code === 200) {
                    showMessage('密码重置成功，请登录', 'success');
                    setTimeout(function() {
                        window.location.href = '/login.html';
                    }, 1500);
                } else {
                    showMessage(data.message || '密码重置失败', 'error');
                }
            } catch (error) {
                console.error('重置密码失败：', error);
                showMessage('重置密码失败，请检查网络连接', 'error');
            }
        }
    </script>
</body>
</html>
