<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT技术问答网站 - 问题列表</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        /* 主题变量 */
        :root {
            /* 默认主题 */
            --bg-primary: linear-gradient(145deg, #0f0f1e 0%, #1a1a2e 25%,  #16213e 50%, #0d0d1a 75%, #0a0a14 100%);
            --bg-secondary: rgba(26, 26, 46, 0.6);
            --bg-tertiary: rgba(26, 26, 46, 0.4);
            --text-primary: #e8eaed;
            --text-secondary: #94a3b8;
            --text-tertiary: #64748b;
            --border-color: rgba(236, 72, 153, 0.1);
            --accent-color: #ec4899;
            --accent-secondary: #8b5cf6;
            --header-bg: rgba(15, 15, 30, 0.92);
            --card-bg: rgba(26, 26, 46, 0.6);
            --btn-secondary-bg: rgba(148, 163, 184, 0.15);
            --btn-secondary-text: #94a3b8;
            --btn-secondary-border: rgba(148, 163, 184, 0.25);
            --shadow-color: rgba(0, 0, 0, 0.4);
        }
        
        /* 亮色主题 */
        [data-theme="light"] {
            --bg-primary: linear-gradient(145deg, #f8fafc 0%, #e2e8f0 25%, #cbd5e1 50%, #e2e8f0 75%, #f8fafc 100%);
            --bg-secondary: rgba(255, 255, 255, 0.8);
            --bg-tertiary: rgba(255, 255, 255, 0.6);
            --text-primary: #1e293b;
            --text-secondary: #475569;
            --text-tertiary: #64748b;
            --border-color: rgba(71, 85, 105, 0.1);
            --accent-color: #d946ef;
            --accent-secondary: #8b5cf6;
            --header-bg: rgba(255, 255, 255, 0.92);
            --card-bg: rgba(255, 255, 255, 0.8);
            --btn-secondary-bg: rgba(71, 85, 105, 0.1);
            --btn-secondary-text: #475569;
            --btn-secondary-border: rgba(71, 85, 105, 0.2);
            --shadow-color: rgba(0, 0, 0, 0.1);
        }
        
        /* 深色主题 */
        [data-theme="dark"] {
            --bg-primary: linear-gradient(145deg, #0a0a0a 0%, #1a1a1a 25%, #2a2a2a 50%, #1a1a1a 75%, #0a0a0a 100%);
            --bg-secondary: rgba(42, 42, 42, 0.8);
            --bg-tertiary: rgba(42, 42, 42, 0.6);
            --text-primary: #ffffff;
            --text-secondary: #b3b3b3;
            --text-tertiary: #808080;
            --border-color: rgba(255, 255, 255, 0.1);
            --accent-color: #ff4081;
            --accent-secondary: #7c4dff;
            --header-bg: rgba(26, 26, 26, 0.95);
            --card-bg: rgba(42, 42, 42, 0.8);
            --btn-secondary-bg: rgba(179, 179, 179, 0.1);
            --btn-secondary-text: #b3b3b3;
            --btn-secondary-border: rgba(179, 179, 179, 0.2);
            --shadow-color: rgba(0, 0, 0, 0.6);
        }
        
        /* 高对比度主题 */
        [data-theme="high-contrast"] {
            --bg-primary: #000000;
            --bg-secondary: #1a1a1a;
            --bg-tertiary: #2a2a2a;
            --text-primary: #ffffff;
            --text-secondary: #ffffff;
            --text-tertiary: #cccccc;
            --border-color: #ffffff;
            --accent-color: #ff00ff;
            --accent-secondary: #00ffff;
            --header-bg: #000000;
            --card-bg: #1a1a1a;
            --btn-secondary-bg: #333333;
            --btn-secondary-text: #ffffff;
            --btn-secondary-border: #ffffff;
            --shadow-color: rgba(255, 255, 255, 0.2);
        }
        
        body {
            font-family: 'Inter', 'Noto Sans SC', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            padding-top: 72px;
            min-height: 100vh;
            overflow-x: hidden;
            letter-spacing: 0.01em;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 15% 45%, rgba(236, 72, 153, 0.08) 0%, transparent 55%),
                radial-gradient(circle at 85% 25%, rgba(124, 58, 237, 0.06) 0%, transparent 50%),
                radial-gradient(circle at 50% 85%, rgba(59, 130, 246, 0.05) 0%, transparent 45%);
            pointer-events: none;
            z-index: 0;
        }
        
        [data-theme="light"] body::before {
            background: 
                radial-gradient(circle at 15% 45%, rgba(236, 72, 153, 0.05) 0%, transparent 55%),
                radial-gradient(circle at 85% 25%, rgba(124, 58, 237, 0.04) 0%, transparent 50%),
                radial-gradient(circle at 50% 85%, rgba(59, 130, 246, 0.03) 0%, transparent 45%);
        }
        
        [data-theme="high-contrast"] body::before {
            background: none;
        }
        
        .container {
            max-width: 1440px;
            margin: 0 auto;
            padding: 0 28px;
            position: relative;
            z-index: 1;
        }
        
        header {
            background: rgba(15, 15, 30, 0.92);
            backdrop-filter: blur(24px);
            border-bottom: 1px solid rgba(236, 72, 153, 0.12);
            padding: 0;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
        }
        
        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 40px;
            max-width: 1440px;
            margin: 0 auto;
            padding: 18px 28px;
        }
        
        .header-left {
            display: flex;
            display: flex;
            align-items: center;
            gap: 36px;
        }
        
        .header-right {
            display: flex;
            align-items: center;
            gap: 24px;
        }
        
        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            font-weight: 700;
            cursor: pointer;
            background: linear-gradient(135deg, #ec4899 0%, #8b5cf6 50%, #3b82f6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            letter-spacing: 0.05em;
        }
        
        .logo:hover {
            transform: scale(1.03);
            filter: brightness(1.1);
        }
        
        .nav {
            display: flex;
            gap: 4px;
        }
        
        .nav a {
            color: #94a3b8;
            text-decoration: none;
            padding: 10px 16px;
            border-radius: 6px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 500;
            font-size: 14px;
            position: relative;
        }
        
        .nav a:hover {
            color: #ffffff;
            background: rgba(236, 72, 153, 0.1);
        }
        
        .nav a span {
            position: relative;
            z-index: 1;
        }
        
        .notification-bell {
            position: relative;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            transition: all 0.3s ease;
        }
        
        .notification-bell:hover {
            background: rgba(236, 72, 153, 0.1);
        }
        
        .chat-icon {
            position: relative;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            transition: all 0.3s ease;
            margin-left: 10px;
        }
        
        .chat-icon:hover {
            background: rgba(59, 130, 246, 0.1);
        }
        
        .chat-icon-symbol {
            font-size: 22px;
        }
        
        .bell-icon {
            font-size: 22px;
        }
        
        .notification-badge {
            position: absolute;
            top: 2px;
            right: 2px;
            min-width: 18px;
            height: 18px;
            background: linear-gradient(135deg, #ec4899, #8b5cf6);
            color: white;
            font-size: 11px;
            font-weight: 600;
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 4px;
            box-shadow: 0 2px 8px rgba(236, 72, 153, 0.4);
        }
        
        .notification-panel {
            position: absolute;
            top: 100%;
            right: 0;
            width: 360px;
            max-height: 480px;
            background: var(--bg-secondary);
            backdrop-filter: blur(24px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            box-shadow: 0 20px 60px var(--shadow-color);
            display: none;
            z-index: 1002;
            overflow: hidden;
        }
        
        .notification-panel.show {
            display: block;
            animation: slideIn 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .notification-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-color);
            font-weight: 600;
            color: var(--text-primary);
        }
        
        .mark-all-read-btn {
            background: linear-gradient(135deg, #ec4899, #8b5cf6);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .mark-all-read-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(236, 72, 153, 0.3);
        }
        
        .notification-list {
            max-height: 400px;
            overflow-y: auto;
        }
        
        .notification-item {
            display: flex;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .notification-item:hover {
            background: rgba(236, 72, 153, 0.05);
        }
        
        .notification-item:last-child {
            border-bottom: none;
        }
        
        .notification-unread {
            background: rgba(236, 72, 153, 0.05);
        }
        
        .notification-read {
            opacity: 0.7;
        }
        
        .notification-icon {
            font-size: 24px;
            margin-right: 12px;
            flex-shrink: 0;
        }
        
        .notification-content {
            flex: 1;
        }
        
        .notification-title {
            font-size: 14px;
            color: var(--text-primary);
            margin-bottom: 4px;
            line-height: 1.4;
        }
        
        .notification-time {
            font-size: 12px;
            color: var(--text-secondary);
        }
        
        .notification-view-all {
            padding: 12px 20px;
            text-align: center;
            color: #ec4899;
            cursor: pointer;
            border-top: 1px solid var(--border-color);
            font-weight: 500;
            transition: all 0.2s ease;
        }
        
        .notification-view-all:hover {
            background: rgba(236, 72, 153, 0.05);
        }
        
        .notification-empty {
            padding: 40px 20px;
            text-align: center;
            color: var(--text-secondary);
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 16px;
            position: relative;
        }
        
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            object-fit: cover;
            border: 2px solid rgba(236, 72, 153, 0.3);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .user-avatar:hover {
            transform: scale(1.05);
            border-color: rgba(236, 72, 153, 0.6);
        }
        
        .user-dropdown {
            position: absolute;
            top: 56px;
            right: 0;
            background: rgba(26, 26, 46, 0.98);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(236, 72, 153, 0.15);
            border-radius: 12px;
            padding: 6px;
            min-width: 180px;
            display: none;
            z-index: 1001;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
        }
        
        .user-dropdown.show {
            display: block;
            animation: dropdownIn 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        @keyframes dropdownIn {
            from {
                opacity: 0;
                transform: translateY(-8px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        
        .user-dropdown-item {
            padding: 12px 18px;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #94a3b8;
            text-decoration: none;
            display: block;
            font-weight: 500;
            font-size: 14px;
            border-radius: 8px;
        }
        
        .user-dropdown-item:hover {
            background: rgba(236, 72, 153, 0.1);
            color: #ffffff;
        }
        
        .user-dropdown-item.logout {
            color: #f87171;
            margin-top: 4px;
            border-top: 1px solid rgba(236, 72, 153, 0.1);
        }
        
        .user-dropdown-item.logout:hover {
            background: rgba(248, 113, 113, 0.1);
        }
        
        .btn {
            padding: 12px 28px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        
        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
            transform: translate(-50%, -50%);
            transition: width 0.5s ease, height 0.5s ease;
        }
        
        .btn:hover::before {
            width: 250px;
            height: 250px;
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #ec4899 0%, #8b5cf6 100%);
            color: white;
        }
        
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(236, 72, 153, 0.3);
        }
        
        .btn-success {
            background: linear-gradient(135deg, #10b981 0%, #06b6d4 100%);
            color: white;
        }
        
        .btn-success:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(16, 185, 129, 0.3);
        }
        
        .btn-danger {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            color: white;
        }
        
        .x-btn-danger:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(239, 68, 68, 0.3);
        }
        
        .btn-secondary {
            background: rgba(148, 163, 184, 0.15);
            color: #94a3b8;
            border: 1px solid rgba(148, 163, 184, 0.25);
        }
        
        .btn-secondary:hover:not(:disabled) {
            background: rgba(148, 163, 184, 0.25);
            color: #ffffff;
        }
        
        .card {
            background: rgba(26, 26, 46, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(236, 72, 153, 0.1);
            border-radius: 16px;
            padding: 32px;
            margin-bottom: 36px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .card:hover {
            border-color: rgba(236, 72, 153, 0.2);
        }
        
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(236, 72, 153, 0.1);
        }
        
        .card-title {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #ec4899 0%, #8b5cf6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .question-item {
            background: rgba(26, 26, 46, 0.4);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(236, 72, 153, 0.08);
            border-radius: 14px;
            padding: 24px;
            margin-bottom: 16px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        
        .question-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(180deg, #ec4899 0%, #8b5cf6 100%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .question-item:hover::before {
            opacity: 1;
        }
        
        .question-item:hover {
            transform: translateX(6px);
            border-color: rgba(236, 72, 153, 0.2);
            background: rgba(26, 26, 46, 0.5);
        }
        
        .question-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
        }
        
        .question-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #8b5cf6 0%, #3b82f6 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 600;
            color: white;
            flex-shrink: 0;
            overflow: hidden;
        }
        
        .question-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }
        
        .question-title {
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 10px;
            color: #ffffff;
            transition: color 0.3s ease;
            line-height: 1.5;
            flex: 1;
        }
        
        .question-item:hover .question-title {
            color: #ec4899;
        }
        
        .question-content {
            color: #94a3b8;
            margin-bottom: 16px;
            line-height: 1.7;
            font-size: 14px;
        }
        
        .question-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #64748b;
            font-size: 13px;
        }
        
        .stats {
            display: flex;
            gap: 16px;
        }
        
        .stat {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 5px 12px;
            background: rgba(236, 72, 153, 0.08);
            border-radius: 20px;
            transition: all 0.3s ease;
            font-size: 13px;
            font-weight: 500;
        }
        
        .stat:hover {
            background: rgba(236, 72, 153, 0.15);
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #94a3b8;
            font-size: 14px;
        }
        
        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px 16px;
            background: rgba(26, 26, 46, 0.6);
            border: 1px solid rgba(236, 72, 153, 0.15);
            border-radius: 10px;
            font-size: 14px;
            color: #ffffff;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #ec4899;
            box-shadow: 0 0 0 3px rgba(236, 72, 153, 0.1);
        }
        
        .form-group textarea {
            min-height: 120px;
            resize: vertical;
        }
        
        .hidden {
            display: none;
        }
        
        .loading {
            text-align: center;
            padding: 80px 20px;
            color: #64748b;
        }
        
        .message-container {
            position: fixed;
            top: 100px;
            right: 28px;
            z-index: 2000;
        }
        
        .success-message {
            background: rgba(16, 185, 129, 0.95);
            backdrop-filter: blur(12px);
            color: white;
            padding: 14px 24px;
            border-radius: 10px;
            margin-bottom: 12px;
            box-shadow: 0 12px 40px rgba(16, 185, 129, 0.25);
            animation: slideIn 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 500;
            font-size: 14px;
        }
        
        .error-message {
            background: rgba(239, 68, 68, 0.95);
            backdrop-filter: blur(12px);
            color: white;
            padding: 14px 24px;
            border-radius: 10px;
            margin-bottom: 12px;
            box-shadow: 0 12px 40px rgba(239, 68, 68, 0.25);
            animation: slideIn 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 500;
            font-size: 14px;
        }
        
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        
        .tag-item {
            display: inline-block;
            background: rgba(236, 72, 153, 0.1);
            color: #94a3b8;
            padding: 7px 18px;
            border-radius: 20px;
            margin: 5px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(236, 72, 153, 0.15);
            font-weight: 500;
        }
        
        .tag-item:hover {
            background: rgba(236, 72, 153, 0.2);
            color: #ffffff;
            transform: translateY(-2px);
        }
        
        .search-box {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }
        
        .search-box input {
            flex: 1;
            background: rgba(26, 31, 58, 0.6);
            border: 1px solid rgba(99, 102, 241, 0.2);
            color: #e0e6ed;
        }
        
        .search-box input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.3);
            background: rgba(26, 31, 58, 0.8);
        }
        
        .search-box input::placeholder {
            color: #6b7280;
        }
        
        .search-box button {
            flex-shrink: 0;
        }
        
        .filter-box {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        
        .filter-box select {
            flex: 1;
            min-width: 200px;
            background: rgba(26, 31, 58, 0.6);
            border: 1px solid rgba(99, 102, 241, 0.2);
            color: #e0e6ed;
        }
        
        .filter-box select:focus {

        .pagination {

        .pagination-info {

        .pagination button {

        .pagination button.active {

        .pagination button:disabled {

        .page-size-selector {

        .page-size-selector select {

            }

    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <div class="header-left">
                <button class="mobile-menu-btn" onclick="toggleMobileMenu()">☰</button>
                <div class="logo" onclick="location.href='/'">技术问答社区</div>
            </div>
            <div class="header-right">
                <nav class="nav" id="mainNav">
                    <a href="/"><span>首页</span></a>
                    <a href="/questions.html"><span>问题列表</span></a>
                    <a href="/tags.html" class="tag-only"><span>标签</span></a>
                </nav>
                <div id="authButtons" class="auth-buttons">
                    <button id="loginBtn" class="btn btn-secondary hidden" onclick="window.location.href='/login.html'">登录</button>
                    <button id="registerBtn" class="btn btn-primary hidden" onclick="window.location.href='/register.html'">注册</button>
                </div>
                <div id="notificationBell" class="notification-bell hidden" onmouseenter="showNotificationPanel()" onmouseleave="hideNotificationPanel()" onclick="toggleNotificationPanelMobile()">
                    <span class="bell-icon">🔔</span>
                    <span id="notificationBadge" class="notification-badge" style="display: none;">0</span>
                    <div id="notificationPanel" class="notification-panel" onmouseenter="showNotificationPanel()" onmouseleave="hideNotificationPanel()" onclick="event.stopPropagation()">
                        <div class="notification-header">
                            <span>消息通知</span>
                            <button class="mark-all-read-btn" onclick="event.stopPropagation(); markAllNotificationsRead()">全部已读</button>
                        </div>
                        <div id="notificationList" class="notification-list">
                            <div class="notification-empty">暂无通知</div>
                        </div>
                    </div>
                </div>
                <div id="chatIcon" class="chat-icon hidden" onclick="window.location.href='/chat.html'">
                    <span class="chat-icon-symbol">💬</span>
                </div>
                <div id="userInfo" class="user-info hidden">
                    <img id="userAvatar" class="user-avatar" src="" alt="用户头像" onclick="toggleUserDropdown()">
                    <div id="userDropdown" class="user-dropdown">
                        <a class="user-dropdown-item" href="/profile.html">个人中心</a>
                        <a class="user-dropdown-item admin-only hidden" href="/admin.html">管理后台</a>
                        <a class="user-dropdown-item logout" onclick="logout()">退出登录</a>
                    </div>
                </div>
            </div>
        </div>
    </header>
    
    <div id="messageContainer" class="message-container"></div>
    
    <div class="container">
        <div class="back-button">
            <button class="btn btn-secondary" onclick="window.location.href='/'">返回首页</button>
        </div>
        
        <div class="card">
            <div class="card-header">
                <div class="card-title">问题列表</div>
                <button class="btn btn-primary" onclick="window.location.href='/ask.html'">提问</button>
            </div>
            
            <div class="search-box">
                <div class="form-group" style="flex: 1; margin-bottom: 0;">
                    <input type="text" id="searchInput" placeholder="搜索问题..." onkeyup="if(event.keyCode===13) searchQuestions()">
                </div>
                <button class="btn btn-primary" onclick="searchQuestions()">搜索</button>
            </div>
            
            <div class="filter-box">
                <div class="form-group" style="flex: 1; margin-bottom: 0;">
                    <select id="tagFilter">
                        <option value="">所有标签</option>
                    </select>
                </div>
                <div class="form-group" style="flex: 1; margin-bottom: 0;">
                    <select id="sortFilter">
                        <option value="newest">最新发布</option>
                        <option value="popular">最受欢迎</option>
                        <option value="mostAnswers">最多回答</option>
                    </select>
                </div>
            </div>
            
            <div id="questionsLoading" class="loading">加载中...</div>
            <div id="questionsList"></div>
        </div>
        
        <div id="pagination" class="pagination">
            <div class="pagination-info">
                共 <span id="totalCount">0</span> 条，
                第 <span id="currentPageNum">1</span> / <span id="totalPageNum">1</span> 页
            </div>
            <div class="page-size-selector">
                <label for="pageSize">每页显示：</label>
                <select id="pageSize" onchange="changePageSize(this.value)">
                    <option value="5">5条</option>
                    <option value="10" selected>10条</option>
                    <option value="20">20条</option>
                    <option value="50">50条</option>
                </select>
            </div>
        </div>
    </div>
    
    <script src="/js/common.js?v=202604061330"></script>
    <script>
        function toggleMobileMenu() {
            const nav = document.getElementById('mainNav');
            nav.classList.toggle('show');
        }
        
        let currentPage = 1;
        let pageSize = 10;
        let allQuestions = [];
        let filteredQuestions = [];
        let allTags = [];
        let totalQuestionsCount = 0;
        
        async function loadQuestions() {
            const loadingDiv = document.getElementById('questionsLoading');
            const listDiv = document.getElementById('questionsList');
            
            loadingDiv.classList.remove('hidden');
            listDiv.innerHTML = '';
            
            try {
                const response = await fetch(API_BASE_URL + '/questions?page=' + currentPage + '&size=' + pageSize);
                const data = await response.json();

                if (data.code == 200) {
                    allQuestions = data.data.records || data.data || [];
                    filteredQuestions = data.data.records || data.data || [];
                    totalQuestionsCount = data.data.total || filteredQuestions.length;
                    displayQuestions();
                } else {
                    showMessage('加载问题失败：' + data.message, 'error');
                }
            } catch (error) {
                showMessage('加载问题失败，请检查后端服务是否启动', 'error');
            } finally {
                loadingDiv.classList.add('hidden');
            }
        }
        
        window.addEventListener('load', function() {
            loadTheme();
            if (typeof updateNav == 'function') {
                updateNav();
            }
            loadTags();
            loadQuestions();
            
            document.getElementById('tagFilter').addEventListener('change', filterQuestions);
            document.getElementById('sortFilter').addEventListener('change', filterQuestions);
            document.getElementById('pageSize').addEventListener('change', function() {
                pageSize = parseInt(this.value);
                currentPage = 1;
                displayQuestions();
            });
        });
        
        function displayQuestions() {
            const container = document.getElementById('questionsList');
            container.innerHTML = '';
            
            const startIndex = (currentPage - 1) * pageSize;
            const endIndex = startIndex + pageSize;
            const pageQuestions = filteredQuestions.slice(startIndex, endIndex);
            
            if (pageQuestions && pageQuestions.length > 0) {
                pageQuestions.forEach(function(question, index) {
                    const card = document.createElement('div');
                    card.className = 'question-item';
                    card.style.animationDelay = index * 0.05 + 's';
                    card.style.animation = 'fadeIn 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards';
                    card.style.opacity = '0';
                    card.onclick = function() { window.location.href = '/question-detail.html?id=' + question.id; };
                    
                    const userName = question.userName || '用户' + question.userId;
                    let avatarHtml = '';
                    if (question.avatar && typeof question.avatar === 'string' && question.avatar.trim() !== '') {
                        let avatarUrl = question.avatar;
                        if (avatarUrl.startsWith('data:image/svg+xml;base64,')) {
                            avatarUrl = avatarUrl.replace('data:image/svg+xml;base64,', 'data:image/svg+xml,');
                        }
                        avatarHtml = '<img src="' + escapeHtml(avatarUrl) + '" alt="用户头像" onerror="this.style.display=\'none\';this.parentElement.innerHTML=\'' + (userName.charAt(0) || 'U').toUpperCase() + '\';">';
                    } else {
                        avatarHtml = (userName.charAt(0) || 'U').toUpperCase();
                    }
                    
                    card.innerHTML = '<div class="question-header">' +
                        '<div class="question-avatar">' + avatarHtml + '</div>' +
                        '<div class="question-title">' + escapeHtml(question.title) + '</div>' +
                        '</div>' +
                        '<div class="question-content">' + escapeHtml(question.content.substring(0, 200)) + '...</div>' +
                        '<div class="question-meta">' +
                        '<div>作者：' + escapeHtml(userName) + '</div>' +
                        '<div class="stats">' +
                        '<div class="stat">👁 ' + (question.viewCount || 0) + '</div>' +
                        '<div class="stat">💬 ' + (question.answerCount || 0) + '</div>' +
                        '<div class="stat">👍 ' + (question.voteCount || 0) + '</div>' +
                        '</div>' +
                        '</div>';
                    container.appendChild(card);
                });
            } else {
                container.innerHTML = '<p style="text-align: center; color: #64748b; padding: 40px;">暂无问题</p>';
            }
            
            updatePagination();
        }
        
        function updatePagination() {
            const paginationDiv = document.getElementById('pagination');
            const totalCountEl = document.getElementById('totalCount');
            const currentPageNumEl = document.getElementById('currentPageNum');
            const totalPageNumEl = document.getElementById('totalPageNum');

            if (!paginationDiv) return;

            const totalCount = totalQuestionsCount || filteredQuestions.length || 0;
            const totalPages = Math.ceil(totalCount / pageSize) || 1;

            console.log('updatePagination - totalCount:', totalCount, 'pageSize:', pageSize, 'totalPages:', totalPages);

            if (totalCountEl) totalCountEl.textContent = totalCount;
            if (currentPageNumEl) currentPageNumEl.textContent = currentPage;
            if (totalPageNumEl) totalPageNumEl.textContent = totalPages;

            // 清除现有的分页按钮
            const existingButtons = paginationDiv.querySelectorAll('button');
            existingButtons.forEach(button => button.remove());

            if (totalPages <= 1) {
                paginationDiv.style.display = 'flex';
                return;
            }

            const prevButton = document.createElement('button');
            prevButton.textContent = '上一页';
            prevButton.disabled = currentPage === 1;
            prevButton.onclick = function() {
                if (currentPage > 1) {
                    currentPage--;
                    displayQuestions();
                }
            };
            paginationDiv.appendChild(prevButton);

            for (let i = 1; i <= totalPages; i++) {
                const pageButton = document.createElement('button');
                pageButton.textContent = i;
                pageButton.className = i === currentPage ? 'active' : '';
                pageButton.onclick = (function(page) {
                    return function() {
                        currentPage = page;
                        displayQuestions();
                    };
                })(i);
                paginationDiv.appendChild(pageButton);
            }

            const nextButton = document.createElement('button');
            nextButton.textContent = '下一页';
            nextButton.disabled = currentPage === totalPages;
            nextButton.onclick = function() {
                if (currentPage < totalPages) {
                    currentPage++;
                    displayQuestions();
                }
            };
            paginationDiv.appendChild(nextButton);
        }

        function changePageSize(newSize) {
            console.log('🔄 切换每页显示条数:', newSize);
            pageSize = parseInt(newSize);
            currentPage = 1;
            console.log('✅ 新pageSize:', pageSize, 'currentPage:', currentPage);
            displayQuestions();
        }

        async function loadTags() {
            try {
                const response = await fetch(API_BASE_URL + '/tags');
                const data = await response.json();
                
                if (data.code == 200) {
                    allTags = data.data;
                    populateTagFilter();
                }
            } catch (error) {
                console.error('加载标签失败：', error);
            }
        }
        
        function populateTagFilter() {
            const tagFilter = document.getElementById('tagFilter');
            tagFilter.innerHTML = '<option value="">所有标签</option>';
            
            allTags.forEach(function(tag) {
                const option = document.createElement('option');
                option.value = tag.id;
                option.textContent = tag.name;
                tagFilter.appendChild(option);
            });
        }
        
        function searchQuestions() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            
            if (searchTerm) {
                filteredQuestions = allQuestions.filter(function(question) {
                    return question.title.toLowerCase().indexOf(searchTerm) !== -1 || 
                           question.content.toLowerCase().indexOf(searchTerm) !== -1;
                });
            } else {
                filteredQuestions = allQuestions;
            }
            
            currentPage = 1;
            filterQuestions();
        }
        
        function filterQuestions() {
            const tagId = document.getElementById('tagFilter').value;
            const sortBy = document.getElementById('sortFilter').value;
            
            let questions = filteredQuestions;
            
            if (tagId) {
                questions = questions.filter(function(question) {
                    return question.tagIds && question.tagIds.indexOf(parseInt(tagId)) !== -1;
                });
            }
            
            switch (sortBy) {
                case 'newest':
                    questions.sort(function(a, b) {
                        return new Date(b.createdAt) - new Date(a.createdAt);
                    });
                    break;
                case 'popular':
                    questions.sort(function(a, b) {
                        return (b.voteCount || 0) - (a.voteCount || 0);
                    });
                    break;
                case 'mostAnswers':
                    questions.sort(function(a, b) {
                        return (b.answerCount || 0) - (a.answerCount || 0);
                    });
                    break;
            }
            
            filteredQuestions = questions;
            currentPage = 1;
            displayQuestions();
        }
        
        // 主题切换功能 - 使用全局主题函数
        function loadTheme() {
            loadGlobalTheme();
        }
    </script>
</body>
