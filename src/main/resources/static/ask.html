<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT技术问答网站 - 提问</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Orbitron:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        /* 主题变量 */
        :root {
            /* 默认主题 */
            --bg-primary: linear-gradient(145deg, #0f0f1e 0%, #1a1a2e 25%,  #16213e 50%, #0d0d1a 75%, #0a0a14 100%);
            --bg-secondary: rgba(26, 26, 46, 0.6);
            --bg-tertiary: rgba(26, 26, 46, 0.4);
            --text-primary: #e8eaed;
            --text-secondary: #94a3b8;
            --text-tertiary: #64748b;
            --border-color: rgba(236, 72, 153, 0.1);
            --accent-color: #ec4899;
            --accent-secondary: #8b5cf6;
            --header-bg: rgba(15, 15, 30, 0.92);
            --card-bg: rgba(26, 26, 46, 0.6);
            --btn-secondary-bg: rgba(148, 163, 184, 0.15);
            --btn-secondary-text: #94a3b8;
            --btn-secondary-border: rgba(148, 163, 184, 0.25);
            --shadow-color: rgba(0, 0, 0, 0.4);
        }
        
        /* 亮色主题 */
        [data-theme="light"] {
            --bg-primary: linear-gradient(145deg, #f8fafc 0%, #e2e8f0 25%, #cbd5e1 50%, #e2e8f0 75%, #f8fafc 100%);
            --bg-secondary: rgba(255, 255, 255, 0.8);
            --bg-tertiary: rgba(255, 255, 255, 0.6);
            --text-primary: #1e293b;
            --text-secondary: #475569;
            --text-tertiary: #64748b;
            --border-color: rgba(71, 85, 105, 0.1);
            --accent-color: #d946ef;
            --accent-secondary: #8b5cf6;
            --header-bg: rgba(255, 255, 255, 0.92);
            --card-bg: rgba(255, 255, 255, 0.8);
            --btn-secondary-bg: rgba(71, 85, 105, 0.1);
            --btn-secondary-text: #475569;
            --btn-secondary-border: rgba(71, 85, 105, 0.2);
            --shadow-color: rgba(0, 0, 0, 0.1);
        }
        
        /* 深色主题 */
        [data-theme="dark"] {
            --bg-primary: linear-gradient(145deg, #0a0a0a 0%, #1a1a1a 25%, #2a2a2a 50%, #1a1a1a 75%, #0a0a0a 100%);
            --bg-secondary: rgba(42, 42, 42, 0.8);
            --bg-tertiary: rgba(42, 42, 42, 0.6);
            --text-primary: #ffffff;
            --text-secondary: #b3b3b3;
            --text-tertiary: #808080;
            --border-color: rgba(255, 255, 255, 0.1);
            --accent-color: #ff4081;
            --accent-secondary: #7c4dff;
            --header-bg: rgba(26, 26, 26, 0.95);
            --card-bg: rgba(42, 42, 42, 0.8);
            --btn-secondary-bg: rgba(179, 179, 179, 0.1);
            --btn-secondary-text: #b3b3b3;
            --btn-secondary-border: rgba(179, 179, 179, 0.2);
            --shadow-color: rgba(0, 0, 0, 0.6);
        }
        
        /* 高对比度主题 */
        [data-theme="high-contrast"] {
            --bg-primary: #000000;
            --bg-secondary: #1a1a1a;
            --bg-tertiary: #2a2a2a;
            --text-primary: #ffffff;
            --text-secondary: #ffffff;
            --text-tertiary: #cccccc;
            --border-color: #ffffff;
            --accent-color: #ff00ff;
            --accent-secondary: #00ffff;
            --header-bg: #000000;
            --card-bg: #1a1a1a;
            --btn-secondary-bg: #333333;
            --btn-secondary-text: #ffffff;
            --btn-secondary-border: #ffffff;
            --shadow-color: rgba(255, 255, 255, 0.2);
        }
        
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            padding-top: 80px;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 50%, rgba(99, 102, 241, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(139, 92, 246, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 40% 80%, rgba(59, 130, 246, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }
        
        [data-theme="light"] body::before {
            background: 
                radial-gradient(circle at 20% 50%, rgba(99, 102, 241, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(139, 92, 246, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 40% 80%, rgba(59, 130, 246, 0.05) 0%, transparent 50%);
        }
        
        [data-theme="high-contrast"] body::before {
            background: none;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px 30px;
            position: relative;
            z-index: 1;
        }
        
        header {
            background: rgba(10, 14, 39, 0.95);
            backdrop-filter: blur(24px);
            border-bottom: 1px solid rgba(99, 102, 241, 0.2);
            color: white;
            padding: 0;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
        }
        
        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 40px;
            max-width: 1440px;
            margin: 0 auto;
            padding: 18px 28px;
        }
        
        .header-left {
            display: flex;
            align-items: center;
            gap: 36px;
        }
        
        .header-right {
            display: flex;
            align-items: center;
            gap: 24px;
        }
        
        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .logo:hover {
            transform: scale(1.05);
            text-shadow: 0 0 20px rgba(102, 126, 234, 0.5);
        }
        
        .nav {
            display: flex;
            gap: 15px;
        }
        
        .nav a {
            color: #e0e6ed;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 8px;
            transition: all 0.3s ease;
            font-weight: 500;
            position: relative;
            overflow: hidden;
        }
        
        .nav a::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transition: left 0.5s ease;
        }
        
        .nav a:hover::before {
            left: 100%;
        }
        
        .nav a:hover {
            background: rgba(99, 102, 241, 0.2);
            color: #fff;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
            position: relative;
        }
        
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            object-fit: cover;
            border: 2px solid rgba(99, 102, 241, 0.5);
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }
        
        .user-avatar:hover {
            transform: scale(1.1);
            border-color: #667eea;
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
        }
        
        .user-dropdown {
            position: absolute;
            top: 60px;
            right: 20px;
            background: rgba(26, 31, 58, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            padding: 10px 0;
            min-width: 150px;
            display: none;
            z-index: 1001;
        }
        
        .user-dropdown.show {
            display: block;
            animation: dropdownFadeIn 0.3s ease;
        }
        
        @keyframes dropdownFadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .user-dropdown-item {
            padding: 12px 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #e0e6ed;
            text-decoration: none;
            display: block;
            font-weight: 500;
        }
        
        .user-dropdown-item:hover {
            background: rgba(99, 102, 241, 0.2);
            color: #fff;
        }
        
        .user-dropdown-item.logout {
            color: #ef4444;
            border-top: 1px solid rgba(99, 102, 241, 0.2);
        }
        
        .user-dropdown-item.logout:hover {
            background: rgba(239, 68, 68, 0.2);
        }
        
        .notification-bell {
            position: relative;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            transition: all 0.3s ease;
        }
        
        .notification-bell:hover {
            background: rgba(236, 72, 153, 0.1);
        }
        
        .bell-icon {
            font-size: 22px;
        }
        
        .notification-badge {
            position: absolute;
            top: 2px;
            right: 2px;
            min-width: 18px;
            height: 18px;
            background: linear-gradient(135deg, #ec4899, #8b5cf6);
            color: white;
            font-size: 11px;
            font-weight: 600;
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 4px;
            box-shadow: 0 2px 8px rgba(236, 72, 153, 0.4);
        }
        
        .notification-panel {
            position: absolute;
            top: 100%;
            right: 0;
            width: 360px;
            max-height: 480px;
            background: var(--bg-secondary);
            backdrop-filter: blur(24px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            box-shadow: 0 20px 60px var(--shadow-color);
            display: none;
            z-index: 1002;
            overflow: hidden;
        }
        
        .notification-panel.show {
            display: block;
            animation: slideIn 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .notification-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-color);
            font-weight: 600;
            color: var(--text-primary);
        }
        
        .mark-all-read-btn {
            background: linear-gradient(135deg, #ec4899, #8b5cf6);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .mark-all-read-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(236, 72, 153, 0.3);
        }
        
        .notification-list {
            max-height: 400px;
            overflow-y: auto;
        }
        
        .notification-item {
            display: flex;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .notification-item:hover {
            background: rgba(236, 72, 153, 0.05);
        }
        
        .notification-item:last-child {
            border-bottom: none;
        }
        
        .notification-unread {
            background: rgba(236, 72, 153, 0.05);
        }
        
        .notification-read {
            opacity: 0.7;
        }
        
        .notification-icon {
            font-size: 24px;
            margin-right: 12px;
            flex-shrink: 0;
        }
        
        .notification-content {
            flex: 1;
        }
        
        .notification-title {
            font-size: 14px;
            color: var(--text-primary);
            margin-bottom: 4px;
            line-height: 1.4;
        }
        
        .notification-time {
            font-size: 12px;
            color: var(--text-secondary);
        }
        
        .notification-view-all {
            padding: 12px 20px;
            text-align: center;
            color: #ec4899;
            cursor: pointer;
            border-top: 1px solid var(--border-color);
            font-weight: 500;
            transition: all 0.2s ease;
        }
        
        .notification-view-all:hover {
            background: rgba(236, 72, 153, 0.05);
        }
        
        .notification-empty {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
        }
        
        .chat-icon {
            position: relative;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            transition: all 0.3s ease;
            margin-left: 10px;
        }
        
        .chat-icon:hover {
            background: rgba(59, 130, 246, 0.1);
        }
        
        .chat-icon-symbol {
            font-size: 22px;
        }
        
        .auth-buttons {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            font-weight: 600;
            position: relative;
            overflow: hidden;
        }
        
        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transform: translate(-50%, -50%);
            transition: width 0.6s ease, height 0.6s ease;
        }
        
        .btn:hover::before {
            width: 300px;
            height: 300px;
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }
        
        .btn-success {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4);
        }
        
        .btn-success:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.6);
        }
        
        .btn-danger {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4);
        }
        
        .btn-danger:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(239, 68, 68, 0.6);
        }
        
        .btn-secondary {
            background: rgba(99, 102, 241, 0.2);
            color: #e0e6ed;
            border: 1px solid rgba(99, 102, 241, 0.3);
        }
        
        .btn-secondary:hover:not(:disabled) {
            background: rgba(99, 102, 241, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }
        
        .card {
            background: rgba(26, 31, 58, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(99, 102, 241, 0.15);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }
        
        .card:hover {
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
            border-color: rgba(99, 102, 241, 0.3);
        }
        
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(99, 102, 241, 0.15);
        }
        
        .card-title {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #e0e6ed;
            font-size: 14px;
        }
        
        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px 15px;
            background: rgba(26, 31, 58, 0.6);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s ease;
            color: #e0e6ed;
            font-family: 'Noto Sans SC', sans-serif;
        }
        
        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.3);
            background: rgba(26, 31, 58, 0.8);
        }
        
        .form-group input::placeholder,
        .form-group textarea::placeholder {
            color: #6b7280;
        }
        
        .form-group textarea {
            min-height: 200px;
            resize: vertical;
        }
        
        .hidden {
            display: none;
        }
        
        .message-container {
            position: fixed;
            top: 100px;
            right: 20px;
            z-index: 2000;
        }
        
        .success-message {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.9) 0%, rgba(5, 150, 105, 0.9) 100%);
            backdrop-filter: blur(10px);
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            margin-bottom: 10px;
            box-shadow: 0 8px 32px rgba(16, 185, 129, 0.4);
            animation: slideIn 0.3s ease-out;
            font-weight: 500;
        }
        
        .error-message {
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.9) 0%, rgba(220, 38, 38, 0.9) 100%);
            backdrop-filter: blur(10px);
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            margin-bottom: 10px;
            box-shadow: 0 8px 32px rgba(239, 68, 68, 0.4);
            animation: slideIn 0.3s ease-out;
            font-weight: 500;
        }
        
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        
        .tag-checkbox {
            display: inline-block;
            margin: 5px;
        }
        
        .tag-checkbox label {
            cursor: pointer;
            padding: 8px 18px;
            border-radius: 20px;
            background: rgba(26, 31, 58, 0.6);
            border: 1px solid rgba(99, 102, 241, 0.2);
            transition: all 0.3s ease;
            display: inline-block;
            font-weight: 500;
            color: #e0e6ed;
        }
        
        .tag-checkbox input[type="checkbox"] {
            display: none;
        }
        
        .tag-checkbox input[type="checkbox"]:checked + label {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: transparent;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        .tag-checkbox label:hover {
            background: rgba(26, 31, 58, 0.8);
            border-color: rgba(99, 102, 241, 0.4);
            transform: translateY(-2px);
        }
        
        .tag-checkbox input[type="checkbox"]:checked + label:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }
        
        .back-button {
            display: inline-block;
            margin-bottom: 20px;
        }
        
        .tips {
            background: rgba(251, 191, 36, 0.1);
            border-left: 4px solid #fbbf24;
            padding: 20px;
            margin-bottom: 25px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }
        
        .tips h4 {
            color: #fbbf24;
            margin-bottom: 12px;
            font-weight: 600;
        }
        
        .tips ul {
            margin-left: 20px;
            color: #fcd34d;
        }
        
        .tips li {
            margin-bottom: 8px;
            line-height: 1.6;
        }

        @media (max-width: 1024px) {
            .container {
                max-width: 95%;
                padding: 0 20px;
            }
            
            .form-row {
                flex-direction: column;
            }
            
            .form-group {
                width: 100%;
            }
        }

        @media (max-width: 768px) {
            body {
                padding-top: 60px;
            }
            
            .header-content {
                padding: 10px 15px;
                gap: 15px;
            }
            
            .header-left {
                gap: 15px;
            }
            
            .logo {
                font-size: 18px;
            }
            
            .nav {
                display: none;
                position: absolute;
                top: 100%;
                left: 0;
                right: 0;
                background: var(--header-bg);
                backdrop-filter: blur(24px);
                flex-direction: column;
                padding: 10px 15px;
                border-bottom: 1px solid var(--border-color);
                z-index: 1001;
            }
            
            .nav.show {
                display: flex;
            }
            
            .nav a {
                padding: 12px 16px;
                border-bottom: 1px solid var(--border-color);
            }
            
            .nav a:last-child {
                border-bottom: none;
            }
            
            .container {
                max-width: 100%;
                padding: 0 15px;
            }
            
            .card {
                margin: 15px;
                padding: 20px;
            }
            
            .card-header {
                padding: 16px;
                margin: -20px -20px 20px -20px;
            }
            
            .card-title {
                font-size: 18px;
            }
            
            .mobile-menu-btn {
                display: block;
                background: none;
                border: none;
                color: var(--text-primary);
                font-size: 24px;
                cursor: pointer;
                padding: 5px;
            }
            
            .notification-panel {
                width: calc(100vw - 30px);
                right: auto;
                left: 50%;
                transform: translateX(-50%);
                max-height: 300px;
                position: fixed;
                top: 60px;
            }
            
            .form-label {
                font-size: 14px;
                margin-bottom: 8px;
            }
            
            .form-input, .form-select, .form-textarea {
                font-size: 14px;
                padding: 10px 12px;
            }
            
            .btn {
                padding: 10px 16px;
                font-size: 14px;
            }
            
            .btn-large {
                padding: 12px 20px;
                font-size: 15px;
            }
            
            .tips {
                font-size: 13px;
                padding: 15px;
            }
            
            .tips h4 {
                font-size: 15px;
            }
            
            .tips li {
                margin-bottom: 6px;
            }
        }
        
        .mobile-menu-btn {
            display: none;
        }

        @media (max-width: 480px) {
            .header-content {
                padding: 10px 15px;
            }
            
            .logo {
                font-size: 16px;
            }
            
            .card {
                margin: 10px;
                padding: 15px;
            }
            
            .card-header {
                padding: 12px;
                margin: -15px -15px 15px -15px;
            }
            
            .card-title {
                font-size: 16px;
            }
            
            .form-input, .form-select, .form-textarea {
                padding: 8px 10px;
                font-size: 13px;
            }
            
            .btn {
                padding: 8px 12px;
                font-size: 13px;
            }
            
            .btn-large {
                padding: 10px 16px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <div class="header-left">
                <button class="mobile-menu-btn" onclick="toggleMobileMenu()">☰</button>
                <div class="logo" onclick="location.href='/'">技术问答社区</div>
            </div>
            <div class="header-right">
                <nav class="nav" id="mainNav">
                    <a href="/"><span>首页</span></a>
                    <a href="/questions.html"><span>问题列表</span></a>
                    <a href="/tags.html" class="tag-only"><span>标签</span></a>
                </nav>
                <div id="authButtons" class="auth-buttons">
                    <button id="loginBtn" class="btn btn-secondary" onclick="window.location.href='/login.html'">登录</button>
                    <button id="registerBtn" class="btn btn-primary" onclick="window.location.href='/register.html'">注册</button>
                </div>
                <div id="notificationBell" class="notification-bell hidden" onmouseenter="showNotificationPanel()" onmouseleave="hideNotificationPanel()" onclick="toggleNotificationPanelMobile()">
                    <span class="bell-icon">🔔</span>
                    <span id="notificationBadge" class="notification-badge" style="display: none;">0</span>
                    <div id="notificationPanel" class="notification-panel" onmouseenter="showNotificationPanel()" onmouseleave="hideNotificationPanel()" onclick="event.stopPropagation()">
                        <div class="notification-header">
                            <span>消息通知</span>
                            <button class="mark-all-read-btn" onclick="event.stopPropagation(); markAllNotificationsRead()">全部已读</button>
                        </div>
                        <div id="notificationList" class="notification-list">
                            <div class="notification-empty">暂无通知</div>
                        </div>
                    </div>
                </div>
                <div id="chatIcon" class="chat-icon hidden" onclick="window.location.href='/chat.html'">
                    <span class="chat-icon-symbol">💬</span>
                </div>
                <div id="userInfo" class="user-info hidden">
                    <img id="userAvatar" class="user-avatar" src="" alt="用户头像" onclick="toggleUserDropdown()">
                    <div id="userDropdown" class="user-dropdown">
                        <a class="user-dropdown-item" href="/profile.html">个人中心</a>
                        <a class="user-dropdown-item admin-only hidden" href="/admin.html">管理后台</a>
                        <a class="user-dropdown-item logout" onclick="logout()">退出登录</a>
                    </div>
                </div>
            </div>
        </div>
    </header>
    
    <div id="messageContainer" class="message-container"></div>
    
    <div class="container">
        <div class="back-button">
            <button class="btn btn-secondary" onclick="window.location.href='/questions.html'">返回问题列表</button>
        </div>
        
        <div class="card">
            <div class="card-header">
                <div class="card-title">提问</div>
            </div>
            
            <div class="tips">
                <h4>提问前请注意：</h4>
                <ul>
                    <li>请确保问题清晰、具体，避免过于模糊或宽泛</li>
                    <li>提供足够的上下文信息，包括相关代码、错误信息等</li>
                    <li>说明你已经尝试过的解决方案</li>
                    <li>选择合适的标签，方便其他用户快速找到你的问题</li>
                </ul>
            </div>
            
            <form id="askForm">
                <div class="form-group">
                    <label for="title">问题标题 *</label>
                    <input type="text" id="title" name="title" required placeholder="请输入问题标题（50字以内）" maxlength="50">
                </div>
                
                <div class="form-group">
                    <label for="content">问题详情 *</label>
                    <textarea id="content" name="content" required placeholder="请详细描述你的问题，包括相关代码、错误信息等"></textarea>
                </div>
                
                <div class="form-group">
                    <label>选择标签（至少选择一个）</label>
                    <div id="tagsList">
                        <p>加载中...</p>
                    </div>
                </div>
                
                <div class="form-group">
                    <button type="submit" class="btn btn-primary" id="submitBtn">提交问题</button>
                    <button type="button" class="btn btn-primary" onclick="window.location.href='/questions.html'">取消</button>
                </div>
            </form>
        </div>
    </div>
    
    <script src="/js/common.js"></script>
    <script>
        function toggleMobileMenu() {
            const nav = document.getElementById('mainNav');
            nav.classList.toggle('show');
        }
        
        let allTags = [];
        
        window.addEventListener('load', function() {
            loadTheme();
            if (typeof updateNav == 'function') {
                updateNav();
            }
            if (typeof checkLogin == 'function') {
                checkLogin();
            }
            if (typeof loadTags == 'function') {
                loadTags();
            }
            
            document.getElementById('askForm').addEventListener('submit', submitQuestion);
        });
        
        function checkLogin() {
            var user = localStorage.getItem('user');
            if (!user) {
                showMessage('请先登录后再提问', 'error');
                setTimeout(function() {
                    window.location.href = '/login.html';
                }, 1500);
            }
        }
        
        async function loadTags() {
            var listDiv = document.getElementById('tagsList');
            listDiv.innerHTML = '<p>加载中...</p>';
            
            try {
                var response = await fetch(API_BASE_URL + '/tags');
                var data = await response.json();
                
                if (data.code == 200) {
                    allTags = data.data;
                    displayTags();
                } else {
                    showMessage('加载标签失败：' + data.message, 'error');
                    listDiv.innerHTML = '<p>加载标签失败</p>';
                }
            } catch (error) {
                console.error('加载标签失败：', error);
                showMessage('加载标签失败，请检查后端服务是否启动', 'error');
                listDiv.innerHTML = '<p>加载标签失败</p>';
            }
        }
        
        function displayTags() {
            var listDiv = document.getElementById('tagsList');
            listDiv.innerHTML = '';
            
            if (allTags && allTags.length > 0) {
                allTags.forEach(function(tag) {
                    var checkboxDiv = document.createElement('div');
                    checkboxDiv.className = 'tag-checkbox';
                    checkboxDiv.innerHTML = '<input type="checkbox" id="tag_' + tag.id + '" value="' + tag.id + '">' +
                        '<label for="tag_' + tag.id + '">' + escapeHtml(tag.name) + '</label>';
                    listDiv.appendChild(checkboxDiv);
                });
            } else {
                listDiv.innerHTML = '<p>暂无标签</p>';
            }
        }
        
        async function submitQuestion(event) {
            event.preventDefault();
            
            var user = localStorage.getItem('user');
            if (!user) {
                showMessage('请先登录后再提问', 'error');
                return;
            }
            
            var userData = JSON.parse(user);
            var title = document.getElementById('title').value.trim();
            var content = document.getElementById('content').value.trim();
            var selectedTags = [];
            
            document.querySelectorAll('input[type="checkbox"]:checked').forEach(function(checkbox) {
                selectedTags.push(parseInt(checkbox.value));
            });
            
            if (!title) {
                showMessage('请输入问题标题', 'error');
                return;
            }
            
            if (!content) {
                showMessage('请输入问题详情', 'error');
                return;
            }
            
            if (selectedTags.length === 0) {
                showMessage('请至少选择一个标签', 'error');
                return;
            }
            
            var submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = '提交中...';
            
            try {
                var response = await fetch(API_BASE_URL + '/questions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        title: title,
                        content: content,
                        userId: userData.id,
                        tagIds: selectedTags
                    })
                });
                
                var data = await response.json();
                
                if (data.code == 200) {
                    showMessage(data.message || '问题提交成功', 'success');
                    setTimeout(function() {
                        window.location.href = '/questions.html';
                    }, 2500);
                } else {
                    showMessage('提交问题失败：' + data.message, 'error');
                }
            } catch (error) {
                console.error('提交问题失败：', error);
                showMessage('提交问题失败，请检查网络连接', 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = '提交问题';
            }
        }
        
        // 主题功能 - 使用全局主题函数
        function loadTheme() {
            loadGlobalTheme();
        }
    </script>
</body>
</html>
