<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统错误 - IT技术问答</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Orbitron:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        /* 主题变量 */
        :root {
            /* 默认主题 */
            --bg-primary: linear-gradient(145deg, #0f0f1e 0%, #1a1a2e 25%,  #16213e 50%, #0d0d1a 75%, #0a0a14 100%);
            --bg-secondary: rgba(26, 26, 46, 0.6);
            --bg-tertiary: rgba(26, 26, 46, 0.4);
            --text-primary: #e8eaed;
            --text-secondary: #94a3b8;
            --text-tertiary: #64748b;
            --border-color: rgba(236, 72, 153, 0.1);
            --accent-color: #ec4899;
            --accent-secondary: #8b5cf6;
            --header-bg: rgba(15, 15, 30, 0.92);
            --card-bg: rgba(26, 26, 46, 0.6);
            --btn-secondary-bg: rgba(148, 163, 184, 0.15);
            --btn-secondary-text: #94a3b8;
            --btn-secondary-border: rgba(148, 163, 184, 0.25);
            --shadow-color: rgba(0, 0, 0, 0.4);
        }
        
        /* 亮色主题 */
        [data-theme="light"] {
            --bg-primary: linear-gradient(145deg, #f8fafc 0%, #e2e8f0 25%, #cbd5e1 50%, #e2e8f0 75%, #f8fafc 100%);
            --bg-secondary: rgba(255, 255, 255, 0.8);
            --bg-tertiary: rgba(255, 255, 255, 0.6);
            --text-primary: #1e293b;
            --text-secondary: #475569;
            --text-tertiary: #64748b;
            --border-color: rgba(71, 85, 105, 0.1);
            --accent-color: #d946ef;
            --accent-secondary: #8b5cf6;
            --header-bg: rgba(255, 255, 255, 0.92);
            --card-bg: rgba(255, 255, 255, 0.8);
            --btn-secondary-bg: rgba(71, 85, 105, 0.1);
            --btn-secondary-text: #475569;
            --btn-secondary-border: rgba(71, 85, 105, 0.2);
            --shadow-color: rgba(0, 0, 0, 0.1);
        }
        
        /* 深色主题 */
        [data-theme="dark"] {
            --bg-primary: linear-gradient(145deg, #0a0a0a 0%, #1a1a1a 25%, #2a2a2a 50%, #1a1a1a 75%, #0a0a0a 100%);
            --bg-secondary: rgba(42, 42, 42, 0.8);
            --bg-tertiary: rgba(42, 42, 42, 0.6);
            --text-primary: #ffffff;
            --text-secondary: #b3b3b3;
            --text-tertiary: #808080;
            --border-color: rgba(255, 255, 255, 0.1);
            --accent-color: #ff4081;
            --accent-secondary: #7c4dff;
            --header-bg: rgba(26, 26, 26, 0.95);
            --card-bg: rgba(42, 42, 42, 0.8);
            --btn-secondary-bg: rgba(179, 179, 179, 0.1);
            --btn-secondary-text: #b3b3b3;
            --btn-secondary-border: rgba(179, 179, 179, 0.2);
            --shadow-color: rgba(0, 0, 0, 0.6);
        }
        
        /* 高对比度主题 */
        [data-theme="high-contrast"] {
            --bg-primary: #000000;
            --bg-secondary: #1a1a1a;
            --bg-tertiary: #2a2a2a;
            --text-primary: #ffffff;
            --text-secondary: #ffffff;
            --text-tertiary: #cccccc;
            --border-color: #ffffff;
            --accent-color: #ff00ff;
            --accent-secondary: #00ffff;
            --header-bg: #000000;
            --card-bg: #1a1a1a;
            --btn-secondary-bg: #333333;
            --btn-secondary-text: #ffffff;
            --btn-secondary-border: #ffffff;
            --shadow-color: rgba(255, 255, 255, 0.2);
        }
        
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--bg-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 50%, rgba(239, 68, 68, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(220, 38, 38, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 40% 80%, rgba(239, 68, 68, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }
        
        [data-theme="light"] body::before {
            background: 
                radial-gradient(circle at 20% 50%, rgba(239, 68, 68, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(220, 38, 38, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 40% 80%, rgba(239, 68, 68, 0.05) 0%, transparent 50%);
        }
        
        [data-theme="high-contrast"] body::before {
            background: none;
        }
        
        .error-container {
            background: var(--bg-secondary);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 20px;
            padding: 50px 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px var(--shadow-color);
            text-align: center;
            position: relative;
            overflow: hidden;
            z-index: 1;
        }
        
        .error-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, #ef4444 0%, #dc2626 100%);
        }
        
        .error-code {
            font-family: 'Orbitron', sans-serif;
            font-size: 100px;
            font-weight: 700;
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            text-shadow: 0 0 30px rgba(239, 68, 68, 0.3);
        }
        
        .error-title {
            font-size: 28px;
            font-weight: 700;
            color: #e0e6ed;
            margin-bottom: 20px;
        }
        
        .error-message {
            color: #94a3b8;
            margin-bottom: 30px;
            line-height: 1.6;
            font-size: 16px;
        }
        
        .error-details {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            text-align: left;
            font-family: 'Orbitron', monospace;
            font-size: 14px;
            color: #fca5a5;
            overflow-x: auto;
            backdrop-filter: blur(10px);
        }
        
        .btn {
            display: inline-block;
            padding: 14px 36px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 600;
            transition: all 0.3s ease;
            margin: 5px;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            position: relative;
            overflow: hidden;
        }
        
        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transform: translate(-50%, -50%);
            transition: width 0.6s ease, height 0.6s ease;
        }
        
        .btn:hover::before {
            width: 300px;
            height: 300px;
        }
        
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.6);
        }
        
        .btn-secondary {
            background: rgba(99, 102, 241, 0.2);
            border: 1px solid rgba(99, 102, 241, 0.3);
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }
        
        .btn-secondary:hover {
            background: rgba(99, 102, 241, 0.3);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.5);
        }
        
        .help-section {
            margin-top: 35px;
            padding-top: 25px;
            border-top: 1px solid rgba(99, 102, 241, 0.15);
        }
        
        .help-title {
            font-size: 18px;
            color: #e0e6ed;
            margin-bottom: 15px;
            font-weight: 600;
        }
        
        .help-list {
            text-align: left;
            color: #94a3b8;
            font-size: 15px;
            line-height: 1.8;
            list-style: none;
            padding: 0;
        }
        
        .help-list li {
            margin-bottom: 8px;
            padding-left: 20px;
            position: relative;
        }
        
        .help-list li::before {
            content: '•';
            position: absolute;
            left: 0;
            color: #667eea;
            font-weight: bold;
        }
        
        /* 移动端响应式设计 */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
            
            .error-container {
                padding: 30px 20px;
                max-width: 100%;
            }
            
            .error-code {
                font-size: 80px;
            }
            
            .error-title {
                font-size: 28px;
            }
            
            .error-message {
                font-size: 16px;
            }
            
            .btn {
                padding: 12px 20px;
                font-size: 15px;
                margin: 5px;
            }
            
            .help-section {
                margin-top: 30px;
            }
            
            .help-title {
                font-size: 18px;
            }
            
            .help-list {
                font-size: 14px;
            }
            
            .help-list li {
                padding: 8px 0 8px 20px;
            }
        }
        
        @media (max-width: 480px) {
            .error-code {
                font-size: 60px;
            }
            
            .error-title {
                font-size: 24px;
            }
            
            .error-message {
                font-size: 15px;
            }
            
            .btn {
                padding: 10px 16px;
                font-size: 14px;
                margin: 5px 0;
                width: 100%;
                display: block;
                text-align: center;
            }
            
            .help-section {
                margin-top: 25px;
            }
            
            .help-title {
                font-size: 16px;
            }
            
            .help-list {
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-code">500</div>
        <h1 class="error-title">服务器内部错误</h1>
        <p class="error-message">抱歉，服务器处理请求时遇到了错误。</p>
        
        <div id="errorDetails" class="error-details" style="display: none;">
            错误详情将在这里显示
        </div>
        
        <div>
            <a href="/index.html" class="btn">返回首页</a>
            <a href="javascript:location.reload()" class="btn btn-secondary">刷新页面</a>
        </div>
        
        <div class="help-section">
            <h3 class="help-title">可能的原因：</h3>
            <ul class="help-list">
                <li>数据库连接失败</li>
                <li>数据库表不存在或结构不正确</li>
                <li>应用程序配置错误</li>
                <li>服务器资源不足</li>
            </ul>
        </div>
        
        <div class="help-section">
            <h3 class="help-title">解决方案：</h3>
            <ul class="help-list">
                <li>检查数据库是否已启动</li>
                <li>确认数据库表结构已正确创建</li>
                <li>查看控制台日志获取详细错误信息</li>
                <li>联系系统管理员</li>
            </ul>
        </div>
    </div>
    
    <script>
        // 主题切换功能
        const themes = [
            { name: 'default', label: '默认', icon: '🌙' },
            { name: 'light', label: '亮色', icon: '☀️' },
            { name: 'dark', label: '深色', icon: '🌑' },
            { name: 'high-contrast', label: '高对比度', icon: '⚡' }
        ];
        
        function loadTheme() {
            const savedTheme = localStorage.getItem('theme') || 'default';
            const theme = themes.find(t => t.name === savedTheme) || themes[0];
            document.documentElement.setAttribute('data-theme', theme.name);
        }
        
        window.onload = function() {
            // 加载主题
            loadTheme();
            
            const errorDetails = document.getElementById('errorDetails');
            
            const urlParams = new URLSearchParams(window.location.search);
            const error = urlParams.get('error');
            const message = urlParams.get('message');
            
            if (error || message) {
                errorDetails.style.display = 'block';
                errorDetails.textContent = error || message;
            }
            
            fetch('/health/database')
                .then(response => response.json())
                .then(data => {
                    if (data.code !== 200) {
                        errorDetails.style.display = 'block';
                        errorDetails.textContent = '数据库连接失败：' + data.message;
                    }
                })
                .catch(err => {
                    errorDetails.style.display = 'block';
                    errorDetails.textContent = '无法连接到服务器';
                });
        };
    </script>
</body>
</html>
