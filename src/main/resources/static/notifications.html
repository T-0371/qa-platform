<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>消息通知</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', 'Noto Sans SC', sans-serif;
            background: linear-gradient(145deg, #0f0f1e 0%, #1a1a2e 25%, #16213e 50%, #0d0d1a 75%, #0a0a14 100%);
            color: #1f2937;
            min-height: 100vh;
            overflow-x: hidden;
            padding-top: 72px;
        }
        
        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 72px;
            background: rgba(15, 15, 30, 0.92);
            backdrop-filter: blur(24px);
            border-bottom: 1px solid rgba(236, 72, 153, 0.1);
            z-index: 1000;
        }
        
        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 32px;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .header-left {
            display: flex;
            align-items: center;
            gap: 32px;
        }
        
        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #ec4899, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .logo-img {
            height: 32px;
            width: auto;
        }
        
        .nav {
            display: flex;
            gap: 8px;
        }
        
        .nav a {
            color: #94a3b8;
            text-decoration: none;
            padding: 10px 16px;
            border-radius: 8px;
            transition: all 0.3s ease;
            font-size: 14px;
        }
        
        .nav a:hover {
            color: #e8eaed;
            background: rgba(236, 72, 153, 0.1);
        }
        
        .nav a.active {
            color: #ec4899;
            background: rgba(236, 72, 153, 0.1);
        }
        
        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .auth-buttons {
            display: flex;
            gap: 12px;
        }
        
        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
        }
        
        .btn-secondary {
            background: rgba(148, 163, 184, 0.15);
            color: #94a3b8;
            border: 1px solid rgba(148, 163, 184, 0.25);
        }
        
        .btn-secondary:hover {
            background: rgba(148, 163, 184, 0.25);
            color: #ffffff;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #ec4899, #8b5cf6);
            color: white;
        }
        
        .notification-bell {
            position: relative;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            transition: all 0.3s ease;
        }
        
        .notification-bell:hover {
            background: rgba(236, 72, 153, 0.1);
        }
        
        .bell-icon {
            font-size: 22px;
        }
        
        .notification-badge {
            position: absolute;
            top: 2px;
            right: 2px;
            min-width: 18px;
            height: 18px;
            background: linear-gradient(135deg, #ec4899, #8b5cf6);
            color: white;
            font-size: 11px;
            font-weight: 600;
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 4px;
            box-shadow: 0 2px 8px rgba(236, 72, 153, 0.4);
        }
        
        .notification-panel {
            position: absolute;
            top: 100%;
            right: 0;
            width: 360px;
            max-height: 480px;
            background: var(--bg-secondary);
            backdrop-filter: blur(24px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            box-shadow: 0 20px 60px var(--shadow-color);
            display: none;
            z-index: 1002;
            overflow: hidden;
        }
        
        .notification-panel.show {
            display: block;
            animation: slideIn 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .notification-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-color);
            font-weight: 600;
            color: var(--text-primary);
        }
        
        .mark-all-read-btn {
            background: linear-gradient(135deg, #ec4899, #8b5cf6);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .mark-all-read-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(236, 72, 153, 0.3);
        }
        
        .notification-list {
            max-height: 400px;
            overflow-y: auto;
        }
        
        .notification-item {
            display: flex;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .notification-item:hover {
            background: rgba(236, 72, 153, 0.05);
        }
        
        .notification-item:last-child {
            border-bottom: none;
        }
        
        .notification-unread {
            background: rgba(236, 72, 153, 0.05);
        }
        
        .notification-read {
            opacity: 0.7;
        }
        
        .notification-icon {
            font-size: 24px;
            margin-right: 12px;
            flex-shrink: 0;
        }
        
        .notification-content {
            flex: 1;
        }
        
        .notification-title {
            font-size: 14px;
            color: var(--text-primary);
            margin-bottom: 4px;
            line-height: 1.4;
        }
        
        .notification-time {
            font-size: 12px;
            color: var(--text-secondary);
        }
        
        .notification-view-all {
            padding: 12px 20px;
            text-align: center;
            color: #ec4899;
            cursor: pointer;
            border-top: 1px solid var(--border-color);
            font-weight: 500;
            transition: all 0.2s ease;
        }
        
        .notification-view-all:hover {
            background: rgba(236, 72, 153, 0.05);
        }
        
        .notification-empty {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
        }
        
        .chat-icon {
            position: relative;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            transition: all 0.3s ease;
            margin-left: 10px;
        }
        
        .chat-icon:hover {
            background: rgba(59, 130, 246, 0.1);
        }
        
        .chat-icon-symbol {
            font-size: 22px;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            position: relative;
        }
        
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            object-fit: cover;
        }
        
        .user-dropdown {
            position: absolute;
            top: 100%;
            right: 0;
            background: rgba(26, 26, 46, 0.95);
            border: 1px solid rgba(236, 72, 153, 0.2);
            border-radius: 8px;
            min-width: 150px;
            display: none;
            z-index: 1001;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }
        
        .user-dropdown.show {
            display: block;
        }
        
        .user-dropdown-item {
            display: block;
            padding: 12px 16px;
            color: #e8eaed;
            text-decoration: none;
            cursor: pointer;
        }
        
        .user-dropdown-item:hover {
            background: rgba(236, 72, 153, 0.1);
        }
        
        .hidden {
            display: none !important;
        }
        
        .message-container {
            position: fixed;
            top: 100px;
            right: 28px;
            z-index: 2000;
        }
        
        .success-message, .error-message {
            padding: 14px 24px;
            border-radius: 10px;
            margin-bottom: 12px;
            animation: slideIn 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 500;
        }
        
        .success-message {
            background: rgba(16, 185, 129, 0.95);
            color: white;
        }
        
        .error-message {
            background: rgba(239, 68, 68, 0.95);
            color: white;
        }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        .notifications-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 32px 20px;
        }
        
        .page-header {
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .back-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: rgba(148, 163, 184, 0.15);
            border: 1px solid rgba(148, 163, 184, 0.25);
            border-radius: 8px;
            color: #94a3b8;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        
        .back-btn:hover {
            background: rgba(148, 163, 184, 0.25);
            color: #ffffff;
        }
        
        .page-title {
            font-size: 24px;
            color: #e8eaed;
            font-weight: bold;
        }
        
        .main-container {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(139, 92, 246, 0.2);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }
        
        .tabs-container {
            display: flex;
            gap: 10px;
            padding: 20px 20px 0;
            flex-wrap: wrap;
            border-bottom: 1px solid rgba(139, 92, 246, 0.2);
            background: rgba(249, 250, 251, 0.95);
        }
        
        .tab-btn {
            padding: 10px 24px;
            border: none;
            border-radius: 20px;
            background: rgba(139, 92, 246, 0.1);
            color: #4b5563;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
            margin-bottom: -1px;
        }
        
        .tab-btn:hover {
            background: rgba(139, 92, 246, 0.15);
            color: #7c3aed;
        }
        
        .tab-btn.active {
            background: linear-gradient(135deg, #8b5cf6, #6366f1);
            color: white;
        }
        
        .action-bar {
            display: flex;
            gap: 10px;
            padding: 15px 20px;
            border-bottom: 1px solid rgba(139, 92, 246, 0.2);
            flex-wrap: wrap;
            background: rgba(249, 250, 251, 0.95);
        }
        
        .action-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s;
        }
        
        .action-btn.delete-all {
            background: #ef4444;
            color: white;
        }
        
        .action-btn.delete-all:hover {
            background: #dc2626;
        }
        
        .action-btn.delete-selected {
            background: #f59e0b;
            color: white;
        }
        
        .action-btn.delete-selected:hover {
            background: #d97706;
        }
        
        .action-btn.select-all {
            background: rgba(148, 163, 184, 0.15);
            color: #94a3b8;
            border: 1px solid rgba(148, 163, 184, 0.25);
        }
        
        .action-btn.select-all:hover {
            background: rgba(148, 163, 184, 0.25);
        }
        
        .page-notification-list {
            min-height: 300px;
        }
        
        .page-notification-item {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            border-bottom: 1px solid rgba(139, 92, 246, 0.1);
            transition: background 0.3s;
            color: #1f2937;
            background: rgba(255, 255, 255, 0.95);
        }
        
        .page-notification-item:hover {
            background: rgba(139, 92, 246, 0.05);
        }
        
        .page-notification-item:last-child {
            border-bottom: none;
        }
        
        .notification-checkbox {
            width: 18px;
            height: 18px;
            margin-right: 15px;
            cursor: pointer;
            accent-color: #8b5cf6;
        }
        
        .page-notification-icon {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, #8b5cf6, #6366f1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            margin-right: 15px;
            flex-shrink: 0;
        }
        
        .page-notification-content {
            flex: 1;
            min-width: 0;
            cursor: pointer;
        }
        
        .page-notification-title {
            color: #1f2937;
            font-size: 14px;
            margin-bottom: 5px;
            word-break: break-word;
            line-height: 1.5;
            font-weight: 500;
        }
        
        .notification-meta {
            display: flex;
            gap: 15px;
            font-size: 12px;
            color: #6b7280;
        }
        
        .notification-actions {
            margin-left: 15px;
        }
        
        .delete-btn {
            padding: 6px 14px;
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .page-notification-item:hover .delete-btn {
            opacity: 1;
        }
        
        .delete-btn:hover {
            background: #dc2626;
        }
        
        .notification-unread {
            background: rgba(236, 72, 153, 0.08);
        }
        
        .notification-unread .page-notification-title {
            font-weight: 600;
            color: #ec4899;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #94a3b8;
        }
        
        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        
        .loading-state {
            text-align: center;
            padding: 40px;
            color: #94a3b8;
        }
        
        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 500;
            margin-left: 10px;
        }
        
        .badge-like {
            background: rgba(236, 72, 153, 0.15);
            color: #ec4899;
        }
        
        .badge-answer {
            background: rgba(16, 185, 129, 0.15);
            color: #10b981;
        }
        
        .badge-chat {
            background: rgba(139, 92, 246, 0.15);
            color: #8b5cf6;
        }
        
        .pagination-container {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            border-top: 1px solid rgba(139, 92, 246, 0.2);
            gap: 8px;
            flex-wrap: wrap;
            background: rgba(255, 255, 255, 0.95);
        }
        
        .pagination-btn {
            padding: 8px 14px;
            border: 1px solid rgba(139, 92, 246, 0.3);
            background: white;
            color: #4b5563;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }
        
        .pagination-btn:hover:not(:disabled) {
            background: rgba(139, 92, 246, 0.1);
            border-color: #8b5cf6;
            color: #7c3aed;
        }
        
        .pagination-btn.active {
            background: linear-gradient(135deg, #8b5cf6, #6366f1);
            color: white;
            border-color: transparent;
        }
        
        .pagination-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .pagination-info {
            color: #6b7280;
            font-size: 14px;
            padding: 0 10px;
        }
        
        .pagination-ellipsis {
            color: #6b7280;
            padding: 0 5px;
        }

        @media (max-width: 1024px) {
            .container {
                max-width: 95%;
                padding: 0 20px;
            }
        }

        @media (max-width: 768px) {
            body {
                padding-top: 60px;
            }
            
            .header-content {
                padding: 10px 15px;
                gap: 15px;
            }
            
            .header-left {
                gap: 15px;
            }
            
            .logo {
                font-size: 18px;
            }
            
            .nav {
                display: none;
                position: absolute;
                top: 100%;
                left: 0;
                right: 0;
                background: var(--header-bg);
                backdrop-filter: blur(24px);
                flex-direction: column;
                padding: 10px 15px;
                border-bottom: 1px solid var(--border-color);
                z-index: 1001;
            }
            
            .nav.show {
                display: flex;
            }
            
            .nav a {
                padding: 12px 16px;
                border-bottom: 1px solid var(--border-color);
            }
            
            .nav a:last-child {
                border-bottom: none;
            }
            
            .container {
                max-width: 100%;
                padding: 0 15px;
            }
            
            .card {
                margin: 15px;
                padding: 20px;
            }
            
            .card-header {
                padding: 16px;
                margin: -20px -20px 20px -20px;
            }
            
            .card-title {
                font-size: 18px;
            }
            
            .mobile-menu-btn {
                display: block;
                background: none;
                border: none;
                color: var(--text-primary);
                font-size: 24px;
                cursor: pointer;
                padding: 5px;
            }
            
            .notification-panel {
                width: calc(100vw - 30px);
                right: auto;
                left: 50%;
                transform: translateX(-50%);
                max-height: 300px;
                position: fixed;
                top: 60px;
            }
            
            .notification-item {
                padding: 15px;
            }
            
            .notification-content {
                font-size: 14px;
            }
            
            .notification-time {
                font-size: 12px;
            }
            
            .pagination {
                flex-direction: column;
                gap: 8px;
            }
            
            .pagination button {
                width: 100%;
            }
            
            .btn {
                padding: 10px 16px;
                font-size: 14px;
            }
        }
        
        .mobile-menu-btn {
            display: none;
        }

        @media (max-width: 480px) {
            .header-content {
                padding: 10px 15px;
            }
            
            .logo {
                font-size: 16px;
            }
            
            .card {
                margin: 10px;
                padding: 15px;
            }
            
            .card-header {
                padding: 12px;
                margin: -15px -15px 15px -15px;
            }
            
            .card-title {
                font-size: 16px;
            }
            
            .notification-item {
                padding: 12px;
            }
            
            .notification-content {
                font-size: 13px;
            }
            
            .notification-time {
                font-size: 11px;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <div class="header-left">
                <button class="mobile-menu-btn" onclick="toggleMobileMenu()">☰</button>
                <div class="logo" onclick="location.href='/'">
                    <img id="navLogo" class="logo-img hidden" src="" alt="Logo">
                    <span class="site-name">TechQA</span>
                </div>
            </div>
            <div class="header-right">
                <nav class="nav" id="mainNav">
                    <a href="/"><span>首页</span></a>
                    <a href="/questions.html"><span>问题列表</span></a>
                    <a href="/tags.html" class="tag-only"><span>标签</span></a>
                </nav>
                <div id="authButtons" class="auth-buttons">
                    <button id="loginBtn" class="btn btn-secondary" onclick="window.location.href='/login.html'">登录</button>
                    <button id="registerBtn" class="btn btn-primary" onclick="window.location.href='/register.html'">注册</button>
                </div>
                <div id="notificationBell" class="notification-bell hidden" onmouseenter="showNotificationPanel()" onmouseleave="hideNotificationPanel()" onclick="toggleNotificationPanelMobile()">
                    <span class="bell-icon">🔔</span>
                    <span id="notificationBadge" class="notification-badge" style="display: none;">0</span>
                    <div id="notificationPanel" class="notification-panel" onmouseenter="showNotificationPanel()" onmouseleave="hideNotificationPanel()" onclick="event.stopPropagation()">
                        <div class="notification-header">
                            <span>消息通知</span>
                            <button class="mark-all-read-btn" onclick="event.stopPropagation(); markAllNotificationsRead()">全部已读</button>
                        </div>
                        <div id="notificationList" class="notification-list">
                            <div class="notification-empty">暂无通知</div>
                        </div>
                    </div>
                </div>
                <div id="chatIcon" class="chat-icon hidden" onclick="window.location.href='/chat.html'">
                    <span class="chat-icon-symbol">💬</span>
                </div>
                <div id="userInfo" class="user-info hidden">
                    <img id="userAvatar" class="user-avatar" src="" alt="用户头像" onclick="toggleUserDropdown()">
                    <div id="userDropdown" class="user-dropdown">
                        <a class="user-dropdown-item" href="/profile.html">个人中心</a>
                        <a class="user-dropdown-item admin-only hidden" href="/admin.html">管理后台</a>
                        <a class="user-dropdown-item logout" onclick="logout()">退出登录</a>
                    </div>
                </div>
            </div>
        </div>
    </header>
    
    <div id="messageContainer" class="message-container"></div>
    
    <div class="notifications-container">
        <div class="page-header">
            <button class="back-btn" onclick="window.location.href='/'">
                <span>返回首页</span>
            </button>
            <h1 class="page-title">消息通知</h1>
        </div>
        
        <div class="main-container">
            <div class="tabs-container">
                <button class="tab-btn active" data-type="ALL" onclick="switchTab('ALL')">全部</button>
                <button class="tab-btn" data-type="LIKE" onclick="switchTab('LIKE')">点赞</button>
                <button class="tab-btn" data-type="ANSWER" onclick="switchTab('ANSWER')">回复</button>
                <button class="tab-btn" data-type="CHAT" onclick="switchTab('CHAT')">聊天</button>
            </div>
            
            <div class="action-bar">
                <button class="action-btn select-all" onclick="toggleSelectAll()">全选/取消</button>
                <button class="action-btn delete-selected" onclick="deleteSelected()">删除选中</button>
                <button class="action-btn delete-all" onclick="deleteAllConfirm()">全部删除</button>
            </div>
            
            <div id="notificationPageList" class="page-notification-list">
                <div class="loading-state">加载中...</div>
            </div>
            
            <div id="paginationContainer" class="pagination-container" style="display: none;"></div>
        </div>
    </div>
    
    <script src="/js/common.js?v=202604061330"></script>
    <script>
        function toggleMobileMenu() {
            const nav = document.getElementById('mainNav');
            nav.classList.toggle('show');
        }
        
        var currentType = 'ALL';
        var allNotifications = [];
        var selectedIds = [];
        var currentPage = 1;
        var pageSize = 10;
        
        document.addEventListener('DOMContentLoaded', function() {
            updateNav();
            loadGlobalTheme();
            loadAllNotifications();
        });
        
        function switchTab(type) {
            currentType = type;
            currentPage = 1;
            selectedIds = [];
            
            var tabs = document.querySelectorAll('.tab-btn');
            tabs.forEach(function(tab) {
                if (tab.dataset.type === type) {
                    tab.classList.add('active');
                } else {
                    tab.classList.remove('active');
                }
            });
            
            renderNotificationsList();
        }
        
        async function loadAllNotifications() {
            var user = localStorage.getItem('user');
            if (!user) {
                window.location.href = '/login.html';
                return;
            }
            
            var userData = JSON.parse(user);
            var userId = userData.id;
            
            try {
                var response = await fetch(API_BASE_URL + '/notifications?userId=' + userId);
                var data = await response.json();
                
                if (data.code === 200) {
                    allNotifications = data.data || [];
                    renderNotificationsList();
                } else {
                    document.getElementById('notificationPageList').innerHTML = 
                        '<div class="empty-state"><div class="empty-state-icon">📭</div><div>加载失败</div></div>';
                }
            } catch (error) {
                console.error('加载通知失败:', error);
                document.getElementById('notificationPageList').innerHTML = 
                    '<div class="empty-state"><div class="empty-state-icon">📭</div><div>加载失败</div></div>';
            }
        }
        
        function getFilteredNotifications() {
            if (currentType === 'ALL') {
                return allNotifications;
            }
            return allNotifications.filter(function(n) {
                return n.type === currentType;
            });
        }
        
        function renderNotificationsList() {
            var listContainer = document.getElementById('notificationPageList');
            var paginationContainer = document.getElementById('paginationContainer');
            
            var filteredNotifications = getFilteredNotifications();
            
            if (!filteredNotifications || filteredNotifications.length === 0) {
                listContainer.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📭</div><div>暂无通知</div></div>';
                paginationContainer.style.display = 'none';
                return;
            }
            
            var totalPages = Math.ceil(filteredNotifications.length / pageSize);
            if (currentPage > totalPages) {
                currentPage = totalPages;
            }
            if (currentPage < 1) {
                currentPage = 1;
            }
            
            var startIndex = (currentPage - 1) * pageSize;
            var endIndex = startIndex + pageSize;
            var pageNotifications = filteredNotifications.slice(startIndex, endIndex);
            
            var html = '';
            pageNotifications.forEach(function(notification) {
                var typeIcon = notification.type === 'LIKE' ? '👍' : (notification.type === 'CHAT' ? '💬' : '📝');
                var typeBadge = notification.type === 'LIKE' ? 'badge-like' : (notification.type === 'CHAT' ? 'badge-chat' : 'badge-answer');
                var typeName = notification.type === 'LIKE' ? '点赞' : (notification.type === 'CHAT' ? '聊天' : '回复');
                var readClass = notification.isRead ? '' : 'notification-unread';
                var timeAgo = getTimeAgo(notification.createdAt);
                var isSelected = selectedIds.indexOf(notification.id) !== -1;
                
                var clickHandler = '';
                if (notification.type === 'CHAT') {
                    clickHandler = 'goToChat(' + notification.fromUserId + ')';
                } else if (notification.questionId && notification.questionId !== null) {
                    clickHandler = 'goToQuestion(' + notification.questionId + ', ' + notification.id + ')';
                }
                
                html += '<div class="page-notification-item ' + readClass + '" id="page-notification-' + notification.id + '">' +
                    '<input type="checkbox" class="notification-checkbox" ' + (isSelected ? 'checked' : '') + ' onclick="event.stopPropagation(); toggleSelect(' + notification.id + ')">' +
                    '<div class="page-notification-icon">' + typeIcon + '</div>' +
                    '<div class="page-notification-content" onclick="' + clickHandler + '">' +
                    '<div class="page-notification-title">' + escapeHtml(notification.content) + '<span class="badge ' + typeBadge + '">' + typeName + '</span></div>' +
                    '<div class="notification-meta">' +
                    '<span>' + (notification.fromUsername || '系统') + '</span>' +
                    '<span>' + timeAgo + '</span>' +
                    '</div>' +
                    '</div>' +
                    '<div class="notification-actions">' +
                    '<button class="delete-btn" onclick="event.stopPropagation(); deleteSingleNotification(' + notification.id + ')">删除</button>' +
                    '</div>' +
                    '</div>';
            });
            
            listContainer.innerHTML = html;
            
            if (totalPages >= 1) {
                renderPagination(totalPages, filteredNotifications.length);
                paginationContainer.style.display = 'flex';
            } else {
                paginationContainer.style.display = 'none';
            }
        }
        
        function renderPagination(totalPages, totalItems) {
            var container = document.getElementById('paginationContainer');
            var html = '';
            
            html += '<button class="pagination-btn" onclick="goToPage(1)" ' + (currentPage === 1 ? 'disabled' : '') + '>首页</button>';
            html += '<button class="pagination-btn" onclick="goToPage(' + (currentPage - 1) + ')" ' + (currentPage === 1 ? 'disabled' : '') + '>上一页</button>';
            
            var startPage = Math.max(1, currentPage - 2);
            var endPage = Math.min(totalPages, currentPage + 2);
            
            if (startPage > 1) {
                html += '<span class="pagination-ellipsis">...</span>';
            }
            
            for (var i = startPage; i <= endPage; i++) {
                html += '<button class="pagination-btn ' + (i === currentPage ? 'active' : '') + '" onclick="goToPage(' + i + ')">' + i + '</button>';
            }
            
            if (endPage < totalPages) {
                html += '<span class="pagination-ellipsis">...</span>';
            }
            
            html += '<button class="pagination-btn" onclick="goToPage(' + (currentPage + 1) + ')" ' + (currentPage === totalPages ? 'disabled' : '') + '>下一页</button>';
            html += '<button class="pagination-btn" onclick="goToPage(' + totalPages + ')" ' + (currentPage === totalPages ? 'disabled' : '') + '>末页</button>';
            
            html += '<span class="pagination-info">共 ' + totalItems + ' 条，第 ' + currentPage + '/' + totalPages + ' 页</span>';
            
            container.innerHTML = html;
        }
        
        function goToPage(page) {
            var filteredNotifications = getFilteredNotifications();
            var totalPages = Math.ceil(filteredNotifications.length / pageSize);
            
            if (page < 1) page = 1;
            if (page > totalPages) page = totalPages;
            
            currentPage = page;
            renderNotificationsList();
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        
        function toggleSelect(id) {
            var index = selectedIds.indexOf(id);
            if (index === -1) {
                selectedIds.push(id);
            } else {
                selectedIds.splice(index, 1);
            }
        }
        
        function toggleSelectAll() {
            var filteredNotifications = getFilteredNotifications();
            var startIndex = (currentPage - 1) * pageSize;
            var endIndex = startIndex + pageSize;
            var pageNotifications = filteredNotifications.slice(startIndex, endIndex);
            
            var allSelected = pageNotifications.every(function(n) {
                return selectedIds.indexOf(n.id) !== -1;
            });
            
            if (allSelected) {
                pageNotifications.forEach(function(n) {
                    var index = selectedIds.indexOf(n.id);
                    if (index !== -1) {
                        selectedIds.splice(index, 1);
                    }
                });
            } else {
                pageNotifications.forEach(function(n) {
                    if (selectedIds.indexOf(n.id) === -1) {
                        selectedIds.push(n.id);
                    }
                });
            }
            
            renderNotificationsList();
        }
        
        async function deleteSingleNotification(id) {
            if (!confirm('确定要删除这条通知吗？')) return;
            
            try {
                await fetch(API_BASE_URL + '/notifications/' + id, {
                    method: 'DELETE'
                });
                
                allNotifications = allNotifications.filter(function(n) {
                    return n.id !== id;
                });
                
                var index = selectedIds.indexOf(id);
                if (index !== -1) {
                    selectedIds.splice(index, 1);
                }
                
                var filteredNotifications = getFilteredNotifications();
                var totalPages = Math.ceil(filteredNotifications.length / pageSize);
                if (currentPage > totalPages && totalPages > 0) {
                    currentPage = totalPages;
                }
                
                renderNotificationsList();
                updateNotificationBadge();
                showMessage('删除成功', 'success');
            } catch (error) {
                console.error('删除失败:', error);
                showMessage('删除失败', 'error');
            }
        }
        
        async function deleteSelected() {
            if (selectedIds.length === 0) {
                showMessage('请先选择要删除的通知', 'error');
                return;
            }
            
            if (!confirm('确定要删除选中的 ' + selectedIds.length + ' 条通知吗？')) return;
            
            try {
                for (var i = 0; i < selectedIds.length; i++) {
                    await fetch(API_BASE_URL + '/notifications/' + selectedIds[i], {
                        method: 'DELETE'
                    });
                }
                
                allNotifications = allNotifications.filter(function(n) {
                    return selectedIds.indexOf(n.id) === -1;
                });
                
                selectedIds = [];
                
                var filteredNotifications = getFilteredNotifications();
                var totalPages = Math.ceil(filteredNotifications.length / pageSize);
                if (currentPage > totalPages && totalPages > 0) {
                    currentPage = totalPages;
                }
                
                renderNotificationsList();
                updateNotificationBadge();
                showMessage('删除成功', 'success');
            } catch (error) {
                console.error('删除失败:', error);
                showMessage('删除失败', 'error');
            }
        }
        
        async function deleteAllConfirm() {
            var filteredNotifications = getFilteredNotifications();
            
            if (filteredNotifications.length === 0) {
                showMessage('暂无通知可删除', 'error');
                return;
            }
            
            if (!confirm('确定要删除全部 ' + filteredNotifications.length + ' 条通知吗？此操作不可恢复！')) return;
            
            var user = localStorage.getItem('user');
            if (!user) return;
            
            var userData = JSON.parse(user);
            var userId = userData.id;
            
            try {
                await fetch(API_BASE_URL + '/notifications/all?userId=' + userId, {
                    method: 'DELETE'
                });
                
                if (currentType === 'ALL') {
                    allNotifications = [];
                } else {
                    allNotifications = allNotifications.filter(function(n) {
                        return n.type !== currentType;
                    });
                }
                
                selectedIds = [];
                currentPage = 1;
                renderNotificationsList();
                updateNotificationBadge();
                showMessage('删除成功', 'success');
            } catch (error) {
                console.error('删除失败:', error);
                showMessage('删除失败', 'error');
            }
        }
        
        function goToChat(fromUserId) {
            window.location.href = '/chat.html?userId=' + fromUserId;
        }
        
        function goToQuestion(questionId, notificationId) {
            if (notificationId) {
                markNotificationRead(notificationId);
            }
            window.location.href = '/question-detail.html?id=' + questionId;
        }
        
        async function markNotificationRead(notificationId) {
            try {
                await fetch(API_BASE_URL + '/notifications/' + notificationId + '/read', {
                    method: 'POST'
                });
            } catch (error) {
                console.error('标记通知已读失败:', error);
            }
        }
    </script>
</body>
</html>
