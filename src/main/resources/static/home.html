<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT技术问答网站 - 首页</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        /* 主题变量 */
        :root {
            /* 默认主题 */
            --bg-primary: linear-gradient(145deg, #0f0f1e 0%, #1a1a2e 25%,  #16213e 50%, #0d0d1a 75%, #0a0a14 100%);
            --bg-secondary: rgba(26, 26, 46, 0.6);
            --bg-tertiary: rgba(26, 26, 46, 0.4);
            --text-primary: #e8eaed;
            --text-secondary: #94a3b8;
            --text-tertiary: #64748b;
            --border-color: rgba(236, 72, 153, 0.1);
            --accent-color: #ec4899;
            --accent-secondary: #8b5cf6;
            --header-bg: rgba(15, 15, 30, 0.92);
            --card-bg: rgba(26, 26, 46, 0.6);
            --btn-secondary-bg: rgba(148, 163, 184, 0.15);
            --btn-secondary-text: #94a3b8;
            --btn-secondary-border: rgba(148, 163, 184, 0.25);
            --shadow-color: rgba(0, 0, 0, 0.4);
        }
        
        /* 亮色主题 */
        [data-theme="light"] {
            --bg-primary: linear-gradient(145deg, #f8fafc 0%, #e2e8f0 25%, #cbd5e1 50%, #e2e8f0 75%, #f8fafc 100%);
            --bg-secondary: rgba(255, 255, 255, 0.8);
            --bg-tertiary: rgba(255, 255, 255, 0.6);
            --text-primary: #1e293b;
            --text-secondary: #475569;
            --text-tertiary: #64748b;
            --border-color: rgba(71, 85, 105, 0.1);
            --accent-color: #d946ef;
            --accent-secondary: #8b5cf6;
            --header-bg: rgba(255, 255, 255, 0.92);
            --card-bg: rgba(255, 255, 255, 0.8);
            --btn-secondary-bg: rgba(71, 85, 105, 0.1);
            --btn-secondary-text: #475569;
            --btn-secondary-border: rgba(71, 85, 105, 0.2);
            --shadow-color: rgba(0, 0, 0, 0.1);
        }
        
        /* 深色主题 */
        [data-theme="dark"] {
            --bg-primary: linear-gradient(145deg, #0a0a0a 0%, #1a1a1a 25%, #2a2a2a 50%, #1a1a1a 75%, #0a0a0a 100%);
            --bg-secondary: rgba(42, 42, 42, 0.8);
            --bg-tertiary: rgba(42, 42, 42, 0.6);
            --text-primary: #ffffff;
            --text-secondary: #b3b3b3;
            --text-tertiary: #808080;
            --border-color: rgba(255, 255, 255, 0.1);
            --accent-color: #ff4081;
            --accent-secondary: #7c4dff;
            --header-bg: rgba(26, 26, 26, 0.95);
            --card-bg: rgba(42, 42, 42, 0.8);
            --btn-secondary-bg: rgba(179, 179, 179, 0.1);
            --btn-secondary-text: #b3b3b3;
            --btn-secondary-border: rgba(179, 179, 179, 0.2);
            --shadow-color: rgba(0, 0, 0, 0.6);
        }
        
        /* 高对比度主题 */
        [data-theme="high-contrast"] {
            --bg-primary: #000000;
            --bg-secondary: #1a1a1a;
            --bg-tertiary: #2a2a2a;
            --text-primary: #ffffff;
            --text-secondary: #ffffff;
            --text-tertiary: #cccccc;
            --border-color: #ffffff;
            --accent-color: #ff00ff;
            --accent-secondary: #00ffff;
            --header-bg: #000000;
            --card-bg: #1a1a1a;
            --btn-secondary-bg: #333333;
            --btn-secondary-text: #ffffff;
            --btn-secondary-border: #ffffff;
            --shadow-color: rgba(255, 255, 255, 0.2);
        }
        
        body {
            font-family: 'Inter', 'Noto Sans SC', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            padding-top: 72px;
            min-height: 100vh;
            overflow-x: hidden;
            letter-spacing: 0.01em;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 15% 45%, rgba(236, 72, 153, 0.08) 0%, transparent 55%),
                radial-gradient(circle at 85% 25%, rgba(124, 58, 237, 0.06) 0%, transparent 50%),
                radial-gradient(circle at 50% 85%, rgba(59, 130, 246, 0.05) 0%, transparent 45%);
            pointer-events: none;
            z-index: 0;
        }
        
        [data-theme="light"] body::before {
            background: 
                radial-gradient(circle at 15% 45%, rgba(236, 72, 153, 0.05) 0%, transparent 55%),
                radial-gradient(circle at 85% 25%, rgba(124, 58, 237, 0.04) 0%, transparent 50%),
                radial-gradient(circle at 50% 85%, rgba(59, 130, 246, 0.03) 0%, transparent 45%);
        }
        
        [data-theme="high-contrast"] body::before {
            background: none;
        }
        
        .container {
            max-width: 1440px;
            margin: 0 auto;
            padding: 0 28px;
            position: relative;
            z-index: 1;
        }
        
        header {
            background: var(--header-bg);
            backdrop-filter: blur(24px);
            border-bottom: 1px solid var(--border-color);
            padding: 0;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
        }
        
        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 40px;
            max-width: 1440px;
            margin: 0 auto;
            padding: 18px 28px;
        }
        
        .header-left {
            display: flex;
            align-items: center;
            gap: 36px;
        }
        
        .header-right {
            display: flex;
            align-items: center;
            gap: 24px;
        }
        
        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            font-weight: 700;
            cursor: pointer;
            background: linear-gradient(135deg, #ec4899 0%, #8b5cf6 50%, #3b82f6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            letter-spacing: 0.05em;
        }
        
        .logo:hover {
            transform: scale(1.03);
            filter: brightness(1.1);
        }
        
        .nav {
            display: flex;
            gap: 4px;
        }
        
        .nav a {
            color: var(--text-secondary);
            text-decoration: none;
            padding: 10px 16px;
            border-radius: 6px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 500;
            font-size: 14px;
            position: relative;
        }
        
        .nav a:hover {
            color: var(--text-primary);
            background: rgba(236, 72, 153, 0.1);
        }
        
        .nav a span {
            position: relative;
            z-index: 1;
        }
        
        .notification-bell {
            position: relative;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            transition: all 0.3s ease;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        
        .notification-bell:hover {
            background: rgba(236, 72, 153, 0.1);
        }
        
        .notification-bell:active {
            background: rgba(236, 72, 153, 0.2);
        }
        
        .chat-icon {
            position: relative;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            transition: all 0.3s ease;
            margin-left: 10px;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        
        .chat-icon:hover {
            background: rgba(59, 130, 246, 0.1);
        }
        
        .chat-icon:active {
            background: rgba(59, 130, 246, 0.2);
        }
        
        .chat-icon-symbol {
            font-size: 22px;
        }
        
        .bell-icon {
            font-size: 22px;
        }
        
        .notification-badge {
            position: absolute;
            top: 2px;
            right: 2px;
            min-width: 18px;
            height: 18px;
            background: linear-gradient(135deg, #ec4899, #8b5cf6);
            color: white;
            font-size: 11px;
            font-weight: 600;
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 4px;
            box-shadow: 0 2px 8px rgba(236, 72, 153, 0.4);
        }
        
        .notification-panel {
            position: absolute;
            top: 100%;
            right: 0;
            width: 360px;
            max-height: 480px;
            background: var(--bg-secondary);
            backdrop-filter: blur(24px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            box-shadow: 0 20px 60px var(--shadow-color);
            display: none;
            z-index: 1002;
            overflow: hidden;
            flex-direction: column;
        }
        
        .notification-panel.show {
            display: flex;
            animation: slideIn 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .notification-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-color);
            font-weight: 600;
            color: var(--text-primary);
        }
        
        .mark-all-read-btn {
            background: linear-gradient(135deg, #ec4899, #8b5cf6);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .mark-all-read-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(236, 72, 153, 0.3);
        }
        
        .notification-list {
            flex: 1;
            overflow-y: auto;
            min-height: 0;
        }
        
        .notification-item {
            display: flex;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
            transition: all 0.2s ease;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
            position: relative;
            min-height: 52px;
        }
        
        .notification-item:hover {
            background: rgba(236, 72, 153, 0.05);
        }
        
        .notification-item:active {
            background: rgba(236, 72, 153, 0.1);
        }
        
        .notification-item:last-child {
            border-bottom: none;
        }
        
        .notification-unread {
            background: rgba(236, 72, 153, 0.05);
        }
        
        .notification-read {
            opacity: 0.7;
        }
        
        .notification-icon {
            font-size: 24px;
            margin-right: 12px;
            flex-shrink: 0;
        }
        
        .notification-content {
            flex: 1;
            min-width: 0;
        }
        
        .notification-title {
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
            font-size: 14px;
        }
        
        .notification-text {
            color: var(--text-secondary);
            font-size: 13px;
            line-height: 1.4;
            margin-bottom: 4px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .notification-time {
            color: var(--text-muted);
            font-size: 12px;
        }
        
        .notification-empty, .notification-loading {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
        }
        
        .notification-view-all {
            text-align: center;
            padding: 12px 20px;
            color: #3b82f6;
            cursor: pointer;
            border-top: 1px solid var(--border-color);
            font-size: 14px;
            transition: background 0.2s;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        
        .notification-view-all:hover {
            background: rgba(59, 130, 246, 0.1);
        }
        
        .notification-view-all:active {
            background: rgba(59, 130, 246, 0.2);
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 16px;
            position: relative;
        }
        
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            object-fit: cover;
            border: 2px solid rgba(236, 72, 153, 0.3);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .user-avatar:hover {
            transform: scale(1.05);
            border-color: rgba(236, 72, 153, 0.6);
        }
        
        .user-dropdown {
            position: absolute;
            top: 56px;
            right: 0;
            background: var(--bg-secondary);
            backdrop-filter: blur(24px);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 6px;
            min-width: 180px;
            display: none;
            z-index: 1001;
            box-shadow: 0 20px 60px var(--shadow-color);
        }
        
        .user-dropdown.show {
            display: block;
            animation: dropdownIn 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        @keyframes dropdownIn {
            from {
                opacity: 0;
                transform: translateY(-8px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        
        .user-dropdown-item {
            padding: 12px 18px;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #94a3b8;
            text-decoration: none;
            display: block;
            font-weight: 500;
            font-size: 14px;
            border-radius: 8px;
        }
        
        .user-dropdown-item:hover {
            background: rgba(236, 72, 153, 0.1);
            color: #ffffff;
        }
        
        .user-dropdown-item.logout {
            color: #f87171;
            margin-top: 4px;
            border-top: 1px solid rgba(236, 72, 153, 0.1);
        }
        
        .user-dropdown-item.logout:hover {
            background: rgba(248, 113, 113, 0.1);
        }
        
        .btn {
            padding: 12px 28px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        
        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
            transform: translate(-50%, -50%);
            transition: width 0.5s ease, height 0.5s ease;
        }
        
        .btn:hover::before {
            width: 250px;
            height: 250px;
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #ec4899 0%, #8b5cf6 100%);
            color: white;
        }
        
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(236, 72, 153, 0.3);
        }
        
        .btn-success {
            background: linear-gradient(135deg, #10b981 0%, #06b6d4 100%);
            color: white;
        }
        
        .btn-success:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(16, 185, 129, 0.3);
        }
        
        .btn-danger {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            color: white;
        }
        
        .btn-danger:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(239, 68, 68, 0.3);
        }
        
        .btn-secondary {
            background: rgba(148, 163, 184, 0.15);
            color: #94a3b8;
            border: 1px solid rgba(148, 163, 184, 0.25);
        }
        
        .btn-secondary:hover:not(:disabled) {
            background: rgba(148, 163, 184, 0.25);
            color: #ffffff;
        }
        
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 32px;
            margin-bottom: 36px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .card:hover {
            border-color: var(--accent-color);
        }
        
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }
        
        .card-title {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #ec4899 0%, #8b5cf6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .question-item {
            background: var(--bg-tertiary);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 24px;
            margin-bottom: 16px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        
        .question-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(180deg, #ec4899 0%, #8b5cf6 100%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .question-item:hover::before {
            opacity: 1;
        }
        
        .question-item:hover {
            transform: translateX(6px);
            border-color: rgba(236, 72, 153, 0.2);
            background: rgba(26, 26, 46, 0.5);
        }
        
        .question-title {
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 10px;
            color: var(--text-primary) !important;
            transition: color 0.3s ease;
            line-height: 1.5;
        }
        
        .question-item:hover .question-title {
            color: var(--accent-color) !important;
        }
        
        .question-content {
            color: var(--text-secondary) !important;
            margin-bottom: 16px;
            line-height: 1.7;
            font-size: 14px;
        }
        
        .question-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--text-tertiary) !important;
            font-size: 13px;
        }
        
        .stats {
            display: flex;
            gap: 16px;
        }
        
        .stat {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 5px 12px;
            background: rgba(236, 72, 153, 0.08);
            border-radius: 20px;
            transition: all 0.3s ease;
            font-size: 13px;
            font-weight: 500;
        }
        
        .stat:hover {
            background: rgba(236, 72, 153, 0.15);
        }
        
        .like-stat {
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .like-stat:hover {
            background: rgba(236, 72, 153, 0.18);
            transform: scale(1.05);
        }
        
        .like-btn {
            background: none;
            border: none;
            font-size: 16px;
            cursor: pointer;
            padding: 2px 4px;
            border-radius: 6px;
            transition: all 0.25s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }
        
        .like-btn:hover {
            transform: scale(1.2);
            background: rgba(236, 72, 153, 0.1);
        }
        
        .like-btn:active {
            transform: scale(0.95);
        }
        
        .like-btn.liked {
            animation: likeHeart 0.4s ease;
        }
        
        .like-btn.liked:hover {
            background: rgba(239, 68, 68, 0.1);
        }
        
        @keyframes likeHeart {
            0% { transform: scale(1); }
            25% { transform: scale(1.4); }
            50% { transform: scale(1.2); }
            75% { transform: scale(1.3); }
            100% { transform: scale(1.1); }
        }
        
        .like-count {
            font-size: 13px;
            min-width: 16px;
            text-align: center;
            font-weight: 600;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #94a3b8;
            font-size: 14px;
        }
        
        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            font-size: 14px;
            color: var(--text-primary);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(236, 72, 153, 0.1);
        }
        
        .form-group textarea {
            min-height: 120px;
            resize: vertical;
        }
        
        .hidden {
            display: none;
        }
        
        .admin-only {
            display: none;
        }
        
        .admin-only:not(.hidden) {
            display: block;
        }
        
        .loading {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-tertiary);
        }
        
        .message-container {
            position: fixed;
            top: 100px;
            right: 28px;
            z-index: 2000;
        }
        
        .success-message {
            background: rgba(16, 185, 129, 0.95);
            backdrop-filter: blur(12px);
            color: white;
            padding: 14px 24px;
            border-radius: 10px;
            margin-bottom: 12px;
            box-shadow: 0 12px 40px rgba(16, 185, 129, 0.25);
            animation: slideIn 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 500;
            font-size: 14px;
        }
        
        .error-message {
            background: rgba(239, 68, 68, 0.95);
            backdrop-filter: blur(12px);
            color: white;
            padding: 14px 24px;
            border-radius: 10px;
            margin-bottom: 12px;
            box-shadow: 0 12px 40px rgba(239, 68, 68, 0.25);
            animation: slideIn 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 500;
            font-size: 14px;
        }
        
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        
        .tag-item {
            display: inline-block;

            background: rgba(236, 72, 153, 0.2);

        }
        
        .hero {
            background: linear-gradient(135deg, rgba(236, 72, 153, 0.12) 0%, rgba(139, 92, 246, 0.08) 100%);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(236, 72, 153, 0.15);
            color: white;
            padding: 72px 48px;
            text-align: center;
            border-radius: 20px;
            margin-bottom: 48px;
            position: relative;
            overflow: hidden;
        }
        
        .hero::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;

            animation: rotate 25s linear infinite;
        }
        
        @keyframes rotate {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }
        
        .hero h1 {
            font-size: 52px;
            margin-bottom: 16px;

        .hero .btn {
            margin: 0 8px;

        .section-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 28px;
            padding-bottom: 12px;
            border-bottom: 2px solid transparent;
            background: linear-gradient(135deg, #ec4899 0%, #8b5cf6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            position: relative;
        }
        
        .section-title::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 48px;
            height: 2px;
            background: linear-gradient(90deg, #ec4899 0%, #8b5cf6 100%);
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 24px;
            margin-bottom: 48px;
        }
        
        .stat-card {
            background: var(--bg-secondary);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 32px;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #ec4899 0%, #8b5cf6 100%);
            transform: scaleX(0);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .stat-card:hover::before {
            transform: scaleX(1);
        }
        
        .stat-card:hover {
            transform: translateY(-6px);
            border-color: rgba(236, 72, 153, 0.25);
        }
        
        .stat-card .number {
            font-family: 'Orbitron', sans-serif;
            font-size: 48px;
            font-weight: 700;
            background: linear-gradient(135deg, #ec4899 0%, #8b5cf6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            transition: all 0.3s ease;
            line-height: 1;
        }
        
        .stat-card:hover .number {

        }
        
        .stat-card .label {
            color: #94a3b8;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.02em;
        }
        
        .stat-card .icon {
            font-size: 36px;
            margin-bottom: 16px;
            display: block;
        }
        
        .stat-loading {
            opacity: 0.5;
        }
        
        .stat-loaded {
            animation: fadeIn 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(16px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        

        
        .parallel-sections {
            display: grid;
            grid-template-columns: 5fr 2fr;
            gap: 32px;

        }

    <script src="/js/common.js?v=202604061330"></script>
    <script>
        function toggleMobileMenu() {
            const nav = document.getElementById('mainNav');
            nav.classList.toggle('show');
        }
        
        async function loadStats() {
            console.log('🚀 开始加载统计数据...');

            try {
                console.log('📊 加载问题数据...');
                const questionsResponse = await fetch(API_BASE_URL + '/questions?page=1&size=10');

                if (!questionsResponse.ok) {
                    throw new Error('HTTP错误! 状态码: ' + questionsResponse.status);
                }

                const questionsData = await questionsResponse.json();
                console.log('✅ 问题数据响应:', questionsData);

                if (questionsData.code == 200 && questionsData.data) {
                    let count = 0;

                    if (typeof questionsData.data === 'object' && !Array.isArray(questionsData.data)) {
                        count = questionsData.data.total ||
                               questionsData.data.count ||
                               (questionsData.data.records ? questionsData.data.records.length : 0) ||
                               0;
                    } else if (Array.isArray(questionsData.data)) {
                        count = questionsData.data.length;
                    }

                    const countEl = document.getElementById('questionsCount');
                    const cardEl = document.getElementById('questionsCard');

                    if (countEl) {
                        countEl.textContent = count;
                    }

                    if (cardEl) {
                        cardEl.classList.remove('stat-loading');
                        cardEl.classList.add('stat-loaded');
                    }

                    console.log('✅ 问题数量已更新:', count);
                } else {
                    console.error('❌ 加载问题数据失败：', questionsData.message || '未知错误');
                    const countEl = document.getElementById('questionsCount');
                    if (countEl) {
                        countEl.textContent = '--';
                        countEl.style.color = '#ef4444';
                    }
                }
            } catch (error) {
                console.error('❌ 加载问题数据异常：', error);
                const countEl = document.getElementById('questionsCount');
                if (countEl) {
                    countEl.textContent = '--';
                    countEl.style.color = '#ef4444';
                }
            }
            
            try {
                console.log('加载标签数据...');
                const tagsResponse = await fetch(API_BASE_URL + '/tags');
                const tagsData = await tagsResponse.json();
                console.log('标签数据响应:', tagsData);
                
                if (tagsData.code == 200) {
                    const count = tagsData.data.length || 0;
                    document.getElementById('tagsCount').textContent = count;
                    document.getElementById('tagsCard').classList.remove('stat-loading');
                    document.getElementById('tagsCard').classList.add('stat-loaded');
                    console.log('标签数量已更新:', count);
                } else {
                    console.error('加载标签数据失败：', tagsData.message);
                }
            } catch (error) {
                console.error('加载标签数据失败：', error);
            }
            
            try {
                console.log('加载用户数据...');
                const usersResponse = await fetch(API_BASE_URL + '/users?page=1&size=1');
                const usersData = await usersResponse.json();
                console.log('用户数据响应:', usersData);
                
                if (usersData.code == 200) {
                    const count = usersData.data.total || usersData.data.length || 0;
                    document.getElementById('usersCount').textContent = count;
                    document.getElementById('usersCard').classList.remove('stat-loading');
                    document.getElementById('usersCard').classList.add('stat-loaded');
                    console.log('用户数量已更新:', count);
                } else {
                    console.error('加载用户数据失败：', usersData.message);
                }
            } catch (error) {
                console.error('加载用户数据失败：', error);
            }
        }
        
        async function loadQuestions() {
            try {
                console.log('开始加载最新问题...');
                const limit = 5; // 默认展示5条最新问题
                const response = await fetch(API_BASE_URL + '/questions/latest?limit=' + limit);
                console.log('响应状态:', response.status);
                const data = await response.json();
                console.log('响应数据:', data);
                
                if (data.code == 200) {
                    const questions = data.data || [];
                    console.log('问题数量:', questions.length);
                    displayQuestions(questions);
                } else {
                    console.error('加载问题失败：', data.message);
                    document.getElementById('questionsLoading').innerHTML = '<p style="text-align: center; color: #64748b;">加载失败：' + data.message + '</p>';
                }
            } catch (error) {
                console.error('加载问题失败：', error);
                document.getElementById('questionsLoading').innerHTML = '<p style="text-align: center; color: #64748b;">加载失败，请检查后端服务是否启动</p>';
            }
        }
        
        function displayQuestions(questions) {
            const container = document.getElementById('questionsList');
            container.innerHTML = '';
            
            if (!questions || questions.length == 0) {
                container.innerHTML = '<p style="text-align: center; color: #64748b; padding: 40px;">暂无问题</p>';
                return;
            }
            
            questions.forEach((question, index) => {
                const item = document.createElement('div');
                item.className = 'question-item';
                item.style.animationDelay = `${index * 0.05}s`;
                item.style.animation = 'fadeIn 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards';
                item.style.opacity = '0';
                
                const content = question.content ? question.content.substring(0, 150) + (question.content.length > 150 ? '...' : '') : '暂无内容';
                
                item.innerHTML = `
                    <div class="question-title">${escapeHtml(question.title)}</div>
                    <div class="question-content">${escapeHtml(content)}</div>
                    <div class="question-meta">
                        <div>作者：${escapeHtml(question.userName || '用户' + question.userId)}</div>
                        <div class="stats">
                            <span class="stat">👁 ${question.viewCount || 0}</span>
                            <span class="stat">💬 ${question.answerCount || 0}</span>
                            <span class="stat like-stat" data-question-id="${question.id}" data-vote-count="${question.voteCount || 0}">
                                <button class="like-btn" onclick="event.stopPropagation();likeQuestion(${question.id},this)" title="点赞">👍</button>
                                <span class="like-count">${question.voteCount || 0}</span>
                            </span>
                        </div>
                    </div>
                `;
                
                item.onclick = function() {
                    window.location.href = '/question-detail.html?id=' + question.id;
                };
                
                container.appendChild(item);
            });
            
            document.getElementById('questionsLoading').classList.add('hidden');
            
            loadUserVoteStatus(questions);
        }
        
        async function loadUserVoteStatus(questions) {
            var user = localStorage.getItem('user');
            if (!user || !questions || questions.length === 0) return;
            
            try {
                var userData = JSON.parse(user);
                var userId = userData.id;
                
                var checks = questions.map(async function(q) {
                    try {
                        var resp = await fetch(API_BASE_URL + '/votes/check?targetType=QUESTION&targetId=' + q.id);
                        if (resp.ok) {
                            var data = await resp.json();
                            if (data.code === 200 && data.data) {
                                var btn = document.querySelector('.like-stat[data-question-id="' + q.id + '"] .like-btn');
                                var countEl = document.querySelector('.like-stat[data-question-id="' + q.id + '"] .like-count');
                                if (btn && data.data.voteType === 1) {
                                    btn.classList.add('liked');
                                    btn.textContent = '❤️';
                                }
                            }
                        }
                    } catch(e) {}
                });
                
                await Promise.all(checks);
                console.log('用户点赞状态加载完成');
            } catch(e) {
                console.error('加载点赞状态失败:', e);
            }
        }
        
        var likeProcessingMap = {};
        
        async function likeQuestion(questionId, btnElement) {
            if (likeProcessingMap[questionId]) return;
            
            var user = localStorage.getItem('user');
            if (!user) {
                showMessage('请先登录后再点赞', 'error');
                setTimeout(function() { window.location.href = '/login.html'; }, 1000);
                return;
            }
            
            likeProcessingMap[questionId] = true;
            var statEl = btnElement.closest('.like-stat');
            var countEl = statEl ? statEl.querySelector('.like-count') : null;
            
            try {
                btnElement.disabled = true;
                btnElement.style.opacity = '0.6';
                
                var response = await fetch(API_BASE_URL + '/votes?targetType=QUESTION&targetId=' + questionId + '&voteType=1', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });
                
                var data = await response.json();
                
                if (data.code === 200) {
                    var currentCount = parseInt(countEl ? countEl.textContent : 0) || 0;
                    var isLiked = btnElement.classList.contains('liked');
                    
                    if (isLiked) {
                        btnElement.classList.remove('liked');
                        btnElement.textContent = '👍';
                        btnElement.style.transform = '';
                        if (countEl) countEl.textContent = Math.max(0, currentCount - 1);
                        showMessage('已取消点赞', 'info');
                    } else {
                        btnElement.classList.add('liked');
                        btnElement.textContent = '❤️';
                        btnElement.style.transform = 'scale(1.3)';
                        setTimeout(function() { btnElement.style.transform = 'scale(1.1)'; }, 200);
                        if (countEl) countEl.textContent = currentCount + 1;
                        showMessage('点赞成功！', 'success');
                    }
                } else {
                    showMessage(data.message || '操作失败', 'error');
                }
            } catch (error) {
                console.error('点赞失败:', error);
                showMessage('网络错误，请重试', 'error');
            } finally {
                btnElement.disabled = false;
                btnElement.style.opacity = '1';
                delete likeProcessingMap[questionId];
            }
        }
        
        // 主题切换功能 - 使用全局主题函数
        function toggleTheme() {
            toggleGlobalTheme();
        }
        
        function loadTheme() {
            const theme = loadGlobalTheme();
            updateThemeButton(theme);
        }
        
        function updateThemeButton(theme) {
            const themeIcon = document.getElementById('themeIcon');
            const themeName = document.getElementById('themeName');
            if (themeIcon) themeIcon.textContent = theme.icon;
            if (themeName) themeName.textContent = theme.label;
        }
        
        async function loadHotQuestions() {
            try {
                console.log('开始加载热门问题...');
                const limit = 5; // 默认展示5条热门问题
                const response = await fetch(API_BASE_URL + '/questions/hot?limit=' + limit);
                console.log('热门问题响应状态:', response.status);
                const data = await response.json();
                console.log('热门问题响应数据:', data);
                
                if (data.code == 200) {
                    displayHotQuestions(data.data);
                } else {
                    console.error('加载热门问题失败：', data.message);
                    document.getElementById('hotQuestionsLoading').innerHTML = '<p style="text-align: center; color: #64748b;">加载失败：' + data.message + '</p>';
                }
            } catch (error) {
                console.error('加载热门问题失败：', error);
                document.getElementById('hotQuestionsLoading').innerHTML = '<p style="text-align: center; color: #64748b;">加载失败，请检查后端服务是否启动</p>';
            }
        }
        
        function displayHotQuestions(questions) {
            const container = document.getElementById('hotQuestionsList');
            container.innerHTML = '';
            
            if (!questions || questions.length == 0) {
                container.innerHTML = '<p style="text-align: center; color: #64748b; padding: 40px;">暂无热门问题</p>';
                document.getElementById('hotQuestionsLoading').classList.add('hidden');
                return;
            }
            
            questions.forEach((question, index) => {
                const item = document.createElement('div');
                item.className = 'question-item';
                item.style.animationDelay = `${index * 0.05}s`;
                item.style.animation = 'fadeIn 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards';
                item.style.opacity = '0';
                
                const rank = index + 1;
                const rankClass = rank <= 3 ? 'top' : '';
                const rankIcon = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : `<span style="color: var(--text-secondary);">#${rank}</span>`;
                
                const content = question.content ? question.content.substring(0, 120) + (question.content.length > 120 ? '...' : '') : '暂无内容';
                
                item.innerHTML = `
                    <div style="display: flex; gap: 16px; align-items: flex-start;">
                        <div style="font-size: 24px; min-width: 40px; text-align: center;">${rankIcon}</div>
                        <div style="flex: 1;">
                            <div class="question-title">${escapeHtml(question.title)}</div>
                            <div class="question-content">${escapeHtml(content)}</div>
                            <div class="question-meta">
                                <div>作者：${question.userName || '用户' + question.userId}</div>
                                <div class="stats">
                                    <span class="stat">👁 ${question.viewCount || 0}</span>
                                    <span class="stat">💬 ${question.answerCount || 0}</span>
                                    <span class="stat like-stat" data-question-id="${question.id}" data-vote-count="${question.voteCount || 0}">
                                        <button class="like-btn" onclick="event.stopPropagation();likeQuestion(${question.id},this)" title="点赞">👍</button>
                                        <span class="like-count">${question.voteCount || 0}</span>
                                    </span>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                
                item.onclick = function() {
                    window.location.href = '/question-detail.html?id=' + question.id;
                };
                
                container.appendChild(item);
            });
            
            document.getElementById('hotQuestionsLoading').classList.add('hidden');
            loadUserVoteStatus(questions);
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            if (typeof updateNav == 'function') {
                updateNav();
            }
            loadTheme();
            loadStats();
            loadQuestions();
            loadHotQuestions();
        });
    </script>
</body>
</html>
