<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="format-detection" content="telephone=no">
    <title>IT技术问答网站 - 登录</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Orbitron:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        /* 主题变量 */
        :root {
            /* 默认主题 */
            --bg-primary: linear-gradient(145deg, #0f0f1e 0%, #1a1a2e 25%,  #16213e 50%, #0d0d1a 75%, #0a0a14 100%);
            --bg-secondary: rgba(26, 26, 46, 0.6);
            --bg-tertiary: rgba(26, 26, 46, 0.4);
            --text-primary: #e8eaed;
            --text-secondary: #94a3b8;
            --text-tertiary: #64748b;
            --border-color: rgba(236, 72, 153, 0.1);
            --accent-color: #ec4899;
            --accent-secondary: #8b5cf6;
            --header-bg: rgba(15, 15, 30, 0.92);
            --card-bg: rgba(26, 26, 46, 0.6);
            --btn-secondary-bg: rgba(148, 163, 184, 0.15);
            --btn-secondary-text: #94a3b8;
            --btn-secondary-border: rgba(148, 163, 184, 0.25);
            --shadow-color: rgba(0, 0, 0, 0.4);
        }
        
        /* 亮色主题 */
        [data-theme="light"] {
            --bg-primary: linear-gradient(145deg, #f8fafc 0%, #e2e8f0 25%, #cbd5e1 50%, #e2e8f0 75%, #f8fafc 100%);
            --bg-secondary: rgba(255, 255, 255, 0.8);
            --bg-tertiary: rgba(255, 255, 255, 0.6);
            --text-primary: #1e293b;
            --text-secondary: #475569;
            --text-tertiary: #64748b;
            --border-color: rgba(71, 85, 105, 0.1);
            --accent-color: #d946ef;
            --accent-secondary: #8b5cf6;
            --header-bg: rgba(255, 255, 255, 0.92);
            --card-bg: rgba(255, 255, 255, 0.8);
            --btn-secondary-bg: rgba(71, 85, 105, 0.1);
            --btn-secondary-text: #475569;
            --btn-secondary-border: rgba(71, 85, 105, 0.2);
            --shadow-color: rgba(0, 0, 0, 0.1);
        }
        
        /* 深色主题 */
        [data-theme="dark"] {
            --bg-primary: linear-gradient(145deg, #0a0a0a 0%, #1a1a1a 25%, #2a2a2a 50%, #1a1a1a 75%, #0a0a0a 100%);
            --bg-secondary: rgba(42, 42, 42, 0.8);
            --bg-tertiary: rgba(42, 42, 42, 0.6);
            --text-primary: #ffffff;
            --text-secondary: #b3b3b3;
            --text-tertiary: #808080;
            --border-color: rgba(255, 255, 255, 0.1);
            --accent-color: #ff4081;
            --accent-secondary: #7c4dff;
            --header-bg: rgba(26, 26, 26, 0.95);
            --card-bg: rgba(42, 42, 42, 0.8);
            --btn-secondary-bg: rgba(179, 179, 179, 0.1);
            --btn-secondary-text: #b3b3b3;
            --btn-secondary-border: rgba(179, 179, 179, 0.2);
            --shadow-color: rgba(0, 0, 0, 0.6);
        }
        
        /* 高对比度主题 */
        [data-theme="high-contrast"] {
            --bg-primary: #000000;
            --bg-secondary: #1a1a1a;
            --bg-tertiary: #2a2a2a;
            --text-primary: #ffffff;
            --text-secondary: #ffffff;
            --text-tertiary: #cccccc;
            --border-color: #ffffff;
            --accent-color: #ff00ff;
            --accent-secondary: #00ffff;
            --header-bg: #000000;
            --card-bg: #1a1a1a;
            --btn-secondary-bg: #333333;
            --btn-secondary-text: #ffffff;
            --btn-secondary-border: #ffffff;
            --shadow-color: rgba(255, 255, 255, 0.2);
        }
        
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 50%, rgba(99, 102, 241, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(139, 92, 246, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 40% 80%, rgba(59, 130, 246, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }
        
        [data-theme="light"] body::before {
            background: 
                radial-gradient(circle at 20% 50%, rgba(99, 102, 241, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(139, 92, 246, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 40% 80%, rgba(59, 130, 246, 0.05) 0%, transparent 50%);
        }
        
        [data-theme="high-contrast"] body::before {
            background: none;
        }
        
        .container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
            position: relative;
            z-index: 1;
        }
        
        .card {
            background: var(--bg-secondary);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 20px;
            padding: 45px;
            box-shadow: 0 8px 32px var(--shadow-color);
            transition: all 0.3s ease;
        }
        
        .card:hover {
            box-shadow: 0 12px 40px var(--shadow-color);
            border-color: rgba(99, 102, 241, 0.3);
        }
        
        .card-header {
            text-align: center;
            margin-bottom: 35px;
        }
        
        .card-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 32px;
            font-weight: 700;
            color: #e0e6ed;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .card-subtitle {
            color: #9ca3af;
            font-size: 14px;
            font-weight: 500;
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: #e0e6ed;
            font-size: 14px;
        }
        
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(26, 31, 58, 0.6);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 12px;
            font-size: 14px;
            transition: all 0.3s ease;
            color: #e0e6ed;
            font-family: 'Noto Sans SC', sans-serif;
            touch-action: manipulation;
            -webkit-appearance: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.3);
            background: rgba(26, 31, 58, 0.8);
        }
        
        .form-group input::placeholder {
            color: #6b7280;
        }
        
        .btn {
            padding: 14px 20px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 15px;
            transition: all 0.3s ease;
            font-weight: 600;
            width: 100%;
            position: relative;
            overflow: hidden;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            z-index: 10;
        }
        
        .btn:active {
            transform: scale(0.98);
        }
        
        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transform: translate(-50%, -50%);
            transition: width 0.6s ease, height 0.6s ease;
        }
        
        .btn:hover::before {
            width: 300px;
            height: 300px;
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }
        
        .btn-secondary {
            background: rgba(99, 102, 241, 0.2);
            color: #e0e6ed;
            border: 1px solid rgba(99, 102, 241, 0.3);
        }
        
        .btn-secondary:hover:not(:disabled) {
            background: rgba(99, 102, 241, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }
        
        .hidden {
            display: none;
        }
        
        .message-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 2000;
            pointer-events: none;
        }
        
        .success-message, .error-message {
            pointer-events: auto;
        }
        
        .success-message {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.9) 0%, rgba(5, 150, 105, 0.9) 100%);
            backdrop-filter: blur(10px);
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            margin-bottom: 10px;
            box-shadow: 0 8px 32px rgba(16, 185, 129, 0.4);
            animation: slideIn 0.3s ease-out;
            font-weight: 500;
        }
        
        .error-message {
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.9) 0%, rgba(220, 38, 38, 0.9) 100%);
            backdrop-filter: blur(10px);
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            margin-bottom: 10px;
            box-shadow: 0 8px 32px rgba(239, 68, 68, 0.4);
            animation: slideIn 0.3s ease-out;
            font-weight: 500;
        }
        
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        
        .form-footer {
            text-align: center;
            margin-top: 25px;
            color: #9ca3af;
            font-size: 14px;
        }
        
        .form-footer a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .form-footer a:hover {
            color: #764ba2;
            text-shadow: 0 0 10px rgba(102, 126, 234, 0.5);
        }
        
        .back-button {
            display: inline-block;
            margin-bottom: 25px;
        }
        
        .modal {
            display: none;
            position: fixed;
            z-index: 3000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
        }
        
        .modal.show {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .modal-content {
            background: rgba(26, 31, 58, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 16px;
            padding: 30px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(99, 102, 241, 0.2);
        }
        
        .modal-title {
            font-size: 20px;
            font-weight: 700;
            color: #e0e6ed;
        }
        
        .close-modal {
            font-size: 28px;
            cursor: pointer;
            color: rgba(224, 230, 237, 0.6);
            transition: all 0.3s ease;
        }
        
        .close-modal:hover {
            color: #e0e6ed;
        }
        
        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 20px;
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }
            
            .card {
                padding: 30px 25px;
            }
            
            .card-title {
                font-size: 26px;
            }
            
            .form-group {
                margin-bottom: 20px;
            }
            
            .form-group input {
                padding: 12px 14px;
                font-size: 16px;
            }
            
            .btn {
                padding: 12px 18px;
                font-size: 16px;
            }
            
            .back-button {
                margin-bottom: 15px;
            }
            
            .back-button .btn {
                padding: 10px 16px;
                font-size: 14px;
            }
        }
        
        @media (max-width: 480px) {
            body {
                padding: 10px;
            }
            
            .container {
                padding: 10px;
            }
            
            .card {
                padding: 25px 20px;
                border-radius: 16px;
            }
            
            .card-title {
                font-size: 22px;
            }
            
            .card-subtitle {
                font-size: 13px;
            }
            
            .form-group label {
                font-size: 13px;
                margin-bottom: 8px;
            }
            
            .form-group input {
                padding: 12px 14px;
                font-size: 16px;
                border-radius: 10px;
            }
            
            .btn {
                padding: 14px 18px;
                font-size: 16px;
                border-radius: 10px;
            }
            
            .form-footer {
                font-size: 13px;
                margin-top: 20px;
            }
            
            .modal-content {
                padding: 20px;
                margin: 15px;
            }
            
            .modal-title {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <div id="messageContainer" class="message-container"></div>
    
    <div class="container">
        <div class="back-button">
            <button class="btn btn-secondary" onclick="window.location.href='/'">返回首页</button>
        </div>
        
        <div class="card">
            <div class="card-header">
                <div class="card-title">用户登录</div>
                <div class="card-subtitle">欢迎回到IT技术问答平台</div>
            </div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">用户名</label>
                    <input type="text" id="username" name="username" required placeholder="请输入用户名">
                </div>
                
                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" name="password" required placeholder="请输入密码">
                </div>
                
                <div class="form-group">
                    <button type="button" class="btn btn-primary" id="submitLoginBtn">登录</button>
                </div>
            </form>
            
            <div class="form-footer">
                <a href="/forgot-password.html">忘记密码</a> | 还没有账号？<a href="/register.html">立即注册</a>
            </div>
        </div>
    </div>
    
    <script src="/js/common.js?v=202604061330"></script>
    <script>
        // 主题切换功能
        const themes = [
            { name: 'default', label: '默认', icon: '🌙' },
            { name: 'light', label: '亮色', icon: '☀️' },
            { name: 'dark', label: '深色', icon: '🌑' },
            { name: 'high-contrast', label: '高对比度', icon: '⚡' }
        ];
        
        function loadTheme() {
            const savedTheme = localStorage.getItem('theme') || 'default';
            const theme = themes.find(t => t.name === savedTheme) || themes[0];
            document.documentElement.setAttribute('data-theme', theme.name);
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            loadTheme();
            
            var submitBtn = document.getElementById('submitLoginBtn');
            if (submitBtn) {
                console.log('Login button found, adding event listeners');
                
                submitBtn.addEventListener('click', function(e) {
                    console.log('Click event triggered');
                    e.preventDefault();
                    e.stopPropagation();
                    doLogin();
                });
                
                submitBtn.addEventListener('touchend', function(e) {
                    console.log('Touchend event triggered');
                    e.preventDefault();
                    e.stopPropagation();
                    doLogin();
                }, { passive: false });
                
                submitBtn.addEventListener('touchstart', function(e) {
                    console.log('Touchstart event triggered');
                }, { passive: true });
            } else {
                console.error('Login button not found!');
            }
            
            var loginForm = document.getElementById('loginForm');
            if (loginForm) {
                loginForm.addEventListener('submit', function(e) {
                    console.log('Form submit event triggered');
                    e.preventDefault();
                    doLogin();
                });
            }
        });
        
        function showMessage(message, type) {
            type = type || 'success';
            var messageDiv = document.createElement('div');
            messageDiv.className = type === 'success' ? 'success-message' : 'error-message';
            messageDiv.textContent = message;
            
            var container = document.getElementById('messageContainer');
            container.appendChild(messageDiv);
            
            setTimeout(function() {
                messageDiv.remove();
            }, 3000);
        }
        
        async function handleLogin(event) {
            if (event) {
                event.preventDefault();
            }
            
            var username = document.getElementById('username').value.trim();
            var password = document.getElementById('password').value;
            
            if (!username) {
                showMessage('请输入用户名', 'error');
                return;
            }
            
            if (!password) {
                showMessage('请输入密码', 'error');
                return;
            }
            
            await performLogin(username, password, false);
        }
        
        function doLogin() {
            var submitLoginBtn = document.getElementById('submitLoginBtn');
            if (submitLoginBtn && submitLoginBtn.disabled) {
                return;
            }
            handleLogin();
        }
        
        async function performLogin(username, password, forceLogin) {
            var submitLoginBtn = document.getElementById('submitLoginBtn');
            submitLoginBtn.disabled = true;
            submitLoginBtn.textContent = '登录中...';
            
            try {
                var response = await fetch(API_BASE_URL + '/users/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: username,
                        password: password,
                        forceLogin: forceLogin
                    })
                });
                
                var data = await response.json();
                
                if (data.code === 200) {
                    console.log('Login success, user data:', data.data);
                    console.log('Login token:', data.data.loginToken);
                    var userJson = JSON.stringify(data.data);
                    localStorage.setItem('user', userJson);
                    localStorage.setItem('token', 'token_' + Date.now());
                    document.cookie = 'userId=' + data.data.id + '; path=/; max-age=86400';
                    showMessage('登录成功', 'success');
                    setTimeout(function() {
                        const urlParams = new URLSearchParams(window.location.search);
                        const returnUrl = urlParams.get('returnUrl');
                        
                        if (returnUrl) {
                            window.location.href = returnUrl;
                        } else if (data.data.role === 'ADMIN') {
                            window.location.href = '/admin.html';
                        } else {
                            window.location.href = '/';
                        }
                    }, 1000);
                } else if (data.code === 409) {
                    showConfirmModal('登录冲突', data.message + '<br><br>点击"确定"将强制下线其他设备并登录，点击"取消"则取消登录。', function() {
                        submitLoginBtn.disabled = false;
                        submitLoginBtn.textContent = '强制登录...';
                        performLogin(username, password, true);
                    }, function() {
                        submitLoginBtn.disabled = false;
                        submitLoginBtn.textContent = '登录';
                    });
                } else {
                    showMessage('登录失败：' + data.message, 'error');
                    submitLoginBtn.disabled = false;
                    submitLoginBtn.textContent = '登录';
                }
            } catch (error) {
                console.error('登录失败：', error);
                showMessage('登录失败，请检查网络连接', 'error');
                submitLoginBtn.disabled = false;
                submitLoginBtn.textContent = '登录';
            }
        }
    </script>
</body>
</html>
