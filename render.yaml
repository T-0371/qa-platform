# Render configuration for Java Spring Boot application
type: web
name: qa-platform
env: docker
dockerfilePath: Dockerfile
healthCheckPath: /health
envVars:
  - key: SPRING_PROFILES_ACTIVE
    value: prod
  - key: DB_HOST
    sync: false
  - key: DB_PORT
    sync: false
  - key: DB_NAME
    sync: false
  - key: DB_USERNAME
    sync: false
  - key: DB_PASSWORD
    sync: false