# Render configuration for Java Spring Boot application
type: web
name: qa-platform
env: java
javaVersion: 11
buildCommand: ./mvnw clean package -DskipTests
startCommand: java -Xmx256m -Xms64m -XX:MaxMetaspaceSize=128m -jar target/qa-platform.jar --spring.profiles.active=prod
healthCheckPath: /health
envVars:
  - key: SPRING_PROFILES_ACTIVE
    value: prod
  - key: DB_HOST
    sync: false
  - key: DB_PORT
    sync: false
  - key: DB_NAME
    sync: false
  - key: DB_USERNAME
    sync: false
  - key: DB_PASSWORD
    sync: false